# EAS Station Nginx Configuration for Bare Metal Deployment
# This file should be placed in /etc/nginx/sites-available/eas-station
# and symlinked to /etc/nginx/sites-enabled/
#
# Requires nginx 1.25.1 or newer for http2 directive support

# Upstream backend server
upstream eas_station_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # SSL configuration - Self-signed certificate (generated during installation)
    ssl_certificate /etc/ssl/certs/eas-station-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/eas-station-selfsigned.key;
    
    # Let's Encrypt configuration (uncomment after running certbot)
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client body size
    client_max_body_size 100M;

    # Timeouts for long-running requests
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Proxy to Flask application
    location / {
        proxy_pass http://eas_station_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        
        # HTTP/1.1 for keep-alive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # WebSocket support for Socket.IO
    location /socket.io/ {
        proxy_pass http://eas_station_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Audio streaming - proxy to audio service (port 5002)
    location /api/audio/stream/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;

        # Streaming-specific settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical: Disable ALL buffering for real-time streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        # Long timeout for continuous streaming
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # CORS headers for audio playback
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Static files (served directly by nginx for better performance)
    location /static/ {
        alias /opt/eas-station/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Access and error logs
    access_log /var/log/nginx/eas-station-access.log;
    error_log /var/log/nginx/eas-station-error.log;
}
