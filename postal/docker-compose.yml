# Postal Mail Server — Docker Compose
# Used by EAS Station for self-hosted outbound email delivery.
#
# DO NOT run this file directly.
# Use:  scripts/setup_postal.sh   (first-time setup)
#       systemctl start eas-station-postal  (thereafter)
#
# Postal web UI:  http://localhost:5000
# Postal SMTP:    localhost:2525  (bound to loopback only)

services:

  # ── Database ─────────────────────────────────────────────────────────────────
  postal-mariadb:
    image: mariadb:10.11
    container_name: postal-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${POSTAL_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: postal
      MYSQL_USER: postal
      MYSQL_PASSWORD: ${POSTAL_DB_PASSWORD}
    volumes:
      - postal-mariadb-data:/var/lib/mysql
    networks:
      - postal-net
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost",
             "-u", "root", "-p${POSTAL_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── Message Queue ─────────────────────────────────────────────────────────────
  postal-rabbitmq:
    image: rabbitmq:3.12-management
    container_name: postal-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: postal
      RABBITMQ_DEFAULT_PASS: ${POSTAL_RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: postal
    volumes:
      - postal-rabbitmq-data:/var/lib/rabbitmq
    networks:
      - postal-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Postal Web UI ─────────────────────────────────────────────────────────────
  postal-web:
    image: ghcr.io/postalserver/postal:3
    container_name: postal-web
    restart: unless-stopped
    command: postal web-server
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./postal.yml:/config/postal.yml:ro
    networks:
      - postal-net
    depends_on:
      postal-mariadb:
        condition: service_healthy
      postal-rabbitmq:
        condition: service_healthy

  # ── Postal Background Worker ───────────────────────────────────────────────────
  postal-worker:
    image: ghcr.io/postalserver/postal:3
    container_name: postal-worker
    restart: unless-stopped
    command: postal worker
    volumes:
      - ./postal.yml:/config/postal.yml:ro
    networks:
      - postal-net
    depends_on:
      - postal-web

  # ── Scheduled Tasks ───────────────────────────────────────────────────────────
  postal-cron:
    image: ghcr.io/postalserver/postal:3
    container_name: postal-cron
    restart: unless-stopped
    command: postal cron
    volumes:
      - ./postal.yml:/config/postal.yml:ro
    networks:
      - postal-net
    depends_on:
      - postal-web

  # ── SMTP Listener (bound to loopback) ─────────────────────────────────────────
  postal-smtp:
    image: ghcr.io/postalserver/postal:3
    container_name: postal-smtp
    restart: unless-stopped
    command: postal smtp-server
    ports:
      # Exposed on loopback only so external hosts cannot relay through us.
      - "127.0.0.1:2525:25"
    volumes:
      - ./postal.yml:/config/postal.yml:ro
    networks:
      - postal-net
    depends_on:
      - postal-web

volumes:
  postal-mariadb-data:
  postal-rabbitmq-data:

networks:
  postal-net:
    driver: bridge
