// ============================================
// GRADIENT COLOR SYSTEM
// ============================================

const GRADIENT_PALETTES = {
    primary: ['#667eea', '#764ba2'],
    success: ['#11998e', '#38ef7d'],
    danger: ['#eb3349', '#f45c43'],
    warning: ['#f093fb', '#f5576c'],
    info: ['#4facfe', '#00f2fe'],
    purple: ['#a855f7', '#6366f1'],
    teal: ['#0891b2', '#06b6d4'],
    orange: ['#f97316', '#fb923c'],
    pink: ['#ec4899', '#f472b6'],
    indigo: ['#6366f1', '#818cf8']
};

const CHART_GRADIENTS = [
    GRADIENT_PALETTES.primary,
    GRADIENT_PALETTES.success,
    GRADIENT_PALETTES.warning,
    GRADIENT_PALETTES.danger,
    GRADIENT_PALETTES.info,
    GRADIENT_PALETTES.purple,
    GRADIENT_PALETTES.teal,
    GRADIENT_PALETTES.orange,
    GRADIENT_PALETTES.pink,
    GRADIENT_PALETTES.indigo
];

function createGradient(ctx, colorStops, vertical = true) {
    const gradient = vertical
        ? ctx.createLinearGradient(0, 0, 0, ctx.canvas.height)
        : ctx.createLinearGradient(0, 0, ctx.canvas.width, 0);
    gradient.addColorStop(0, colorStops[0]);
    gradient.addColorStop(1, colorStops[1]);
    return gradient;
}

function createRadialGradient(ctx, colorStops) {
    const centerX = ctx.canvas.width / 2;
    const centerY = ctx.canvas.height / 2;
    const radius = Math.min(centerX, centerY);
    const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
    gradient.addColorStop(0, colorStops[0]);
    gradient.addColorStop(1, colorStops[1]);
    return gradient;
}

// Heatmap color interpolation
function getHeatmapColor(value, max) {
    if (max === 0) return 'rgba(102, 126, 234, 0.05)';
    const ratio = Math.min(value / max, 1);

    // Beautiful gradient from light purple to deep purple/pink
    const colors = [
        { pos: 0, r: 102, g: 126, b: 234, a: 0.1 },
        { pos: 0.25, r: 129, g: 140, b: 248, a: 0.3 },
        { pos: 0.5, r: 168, g: 85, b: 247, a: 0.5 },
        { pos: 0.75, r: 236, g: 72, b: 153, a: 0.75 },
        { pos: 1, r: 244, g: 63, b: 94, a: 0.95 }
    ];

    let lower = colors[0], upper = colors[colors.length - 1];
    for (let i = 0; i < colors.length - 1; i++) {
        if (ratio >= colors[i].pos && ratio <= colors[i + 1].pos) {
            lower = colors[i];
            upper = colors[i + 1];
            break;
        }
    }

    const range = upper.pos - lower.pos || 1;
    const t = (ratio - lower.pos) / range;

    const r = Math.round(lower.r + (upper.r - lower.r) * t);
    const g = Math.round(lower.g + (upper.g - lower.g) * t);
    const b = Math.round(lower.b + (upper.b - lower.b) * t);
    const a = lower.a + (upper.a - lower.a) * t;

    return `rgba(${r}, ${g}, ${b}, ${a})`;
}

// ============================================
// THEME MANAGEMENT
// ============================================

function getCSSVar(varName, fallback = '#212529') {
    const value = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    return value || fallback;
}

function getChartThemeColors() {
    const isDark = document.documentElement.getAttribute('data-theme-mode') === 'dark';
    return {
        text: getCSSVar('--text-color', isDark ? '#ffffff' : '#212529'),
        textMuted: getCSSVar('--text-muted', isDark ? '#a8b4cc' : '#8892a6'),
        surface: getCSSVar('--surface-color', isDark ? '#243046' : '#ffffff'),
        border: getCSSVar('--border-color', isDark ? '#40516c' : '#ced7ea'),
        gridLines: isDark ? 'rgba(255, 255, 255, 0.08)' : 'rgba(0, 0, 0, 0.06)'
    };
}

function applyChartTheme() {
    const colors = getChartThemeColors();
    Chart.defaults.font.family = "'Inter', 'Segoe UI', sans-serif";
    Chart.defaults.color = colors.text;
    Chart.defaults.borderColor = colors.border;
    Chart.defaults.plugins.legend.labels.color = colors.text;
    Chart.defaults.plugins.tooltip.backgroundColor = colors.surface;
    Chart.defaults.plugins.tooltip.titleColor = colors.text;
    Chart.defaults.plugins.tooltip.bodyColor = colors.text;
    Chart.defaults.plugins.tooltip.borderColor = colors.border;
    Chart.defaults.plugins.tooltip.borderWidth = 1;
    Chart.defaults.plugins.tooltip.cornerRadius = 8;
    Chart.defaults.plugins.tooltip.padding = 12;
    Chart.defaults.responsive = true;
    Chart.defaults.maintainAspectRatio = false;
    Chart.defaults.plugins.datalabels.display = false;
}

applyChartTheme();

// ============================================
// DATA INITIALIZATION
// ============================================

const statsData = {
    alertByEvent: {{ alert_by_event | tojson | safe }} || [],
    alertBySeverity: {{ alert_by_severity | tojson | safe }} || [],
    alertByStatus: {{ alert_by_status | tojson | safe }} || [],
    alertByYear: {{ alert_by_year | tojson | safe }} || [],
    mostAffectedBoundaries: {{ most_affected_boundaries | tojson | safe }} || [],
    avgDurations: {{ avg_durations | tojson | safe }} || [],
    recentByDay: {{ recent_by_day | tojson | safe }} || [],
    boundaryStats: {{ boundary_stats | tojson | safe }} || [],
    polling: {{ polling | tojson | safe }} || {},
    alertEvents: {{ alert_events | tojson | safe }} || [],
    filterOptions: {{ filter_options | tojson | safe }} || { severities: [], statuses: [], events: [] },
    dailyAlerts: {{ daily_alerts | tojson | safe }} || [],
    dowHourMatrix: {{ dow_hour_matrix | tojson | safe }} || Array.from({ length: 7 }, () => Array(24).fill(0)),
    lifecycleTimeline: {{ lifecycle_timeline | tojson | safe }} || []
};

const baseAlerts = (statsData.alertEvents || []).map(alert => ({
    ...alert,
    sentDate: alert.sent ? new Date(alert.sent) : null,
    expiresDate: alert.expires ? new Date(alert.expires) : null
})).filter(alert => alert.sentDate && !isNaN(alert.sentDate.getTime()));

// ============================================
// STATE MANAGEMENT
// ============================================

const state = {
    charts: {},
    filters: {
        preset: 'last30',
        startDate: null,
        endDate: null,
        severities: new Set(),
        statuses: new Set(),
        events: new Set()
    },
    filteredAlerts: [],
    aggregates: null,
    systemStartDate: localStorage.getItem('statsSystemStartDate') || '2024-01-01',
    staticChartsInitialized: false
};

// ============================================
// FILTER MANAGEMENT
// ============================================

function populateFilterSelect(id, options) {
    const select = document.getElementById(id);
    if (!select) return;
    select.innerHTML = options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
}

function setPresetDates(preset) {
    const end = new Date();
    end.setHours(23, 59, 59, 999);
    const start = new Date(end);

    const days = { last7: 6, last30: 29, last90: 89, last180: 179, last365: 364 };
    if (days[preset] !== undefined) {
        start.setDate(end.getDate() - days[preset]);
    }
    start.setHours(0, 0, 0, 0);

    state.filters.preset = preset;
    state.filters.startDate = start;
    state.filters.endDate = end;
    updateDateInputs();
}

function updateDateInputs() {
    const startInput = document.getElementById('startDateInput');
    const endInput = document.getElementById('endDateInput');
    if (startInput && state.filters.startDate) {
        startInput.value = state.filters.startDate.toISOString().slice(0, 10);
    }
    if (endInput && state.filters.endDate) {
        endInput.value = state.filters.endDate.toISOString().slice(0, 10);
    }
}

function handlePresetChange(e) {
    const preset = e.target.value;
    if (preset !== 'custom') {
        setPresetDates(preset);
        applyFiltersFromInputs();
    } else {
        state.filters.preset = 'custom';
    }
}

function getSelectedValues(select) {
    return select ? Array.from(select.selectedOptions).map(o => o.value) : [];
}

function applyFiltersFromInputs() {
    const presetSelect = document.getElementById('dateRangePreset');
    const preset = presetSelect ? presetSelect.value : state.filters.preset;

    if (preset === 'custom') {
        state.filters.preset = 'custom';
        const startInput = document.getElementById('startDateInput');
        const endInput = document.getElementById('endDateInput');
        state.filters.startDate = startInput?.value ? new Date(startInput.value + 'T00:00:00') : null;
        state.filters.endDate = endInput?.value ? new Date(endInput.value + 'T23:59:59') : null;
    } else {
        setPresetDates(preset);
    }

    state.filters.severities = new Set(getSelectedValues(document.getElementById('severityFilter')));
    state.filters.statuses = new Set(getSelectedValues(document.getElementById('statusFilter')));
    state.filters.events = new Set(getSelectedValues(document.getElementById('eventFilter')));

    updateDashboard();
}

function resetFilters() {
    state.filters = { preset: 'last30', startDate: null, endDate: null, severities: new Set(), statuses: new Set(), events: new Set() };

    const presetSelect = document.getElementById('dateRangePreset');
    if (presetSelect) presetSelect.value = 'last30';

    ['severityFilter', 'statusFilter', 'eventFilter'].forEach(id => {
        const select = document.getElementById(id);
        if (select) Array.from(select.options).forEach(o => o.selected = false);
    });

    setPresetDates('last30');
    updateDashboard();
}

function exportFilteredData() {
    if (!state.filteredAlerts.length) {
        alert('No filtered alerts to export.');
        return;
    }

    const header = ['identifier', 'sent', 'expires', 'severity', 'status', 'event'];
    const rows = state.filteredAlerts.map(a => [
        `"${a.id || ''}"`,
        a.sentDate?.toISOString() || '',
        a.expiresDate?.toISOString() || '',
        `"${a.severity}"`,
        `"${a.status}"`,
        `"${a.event}"`
    ].join(','));

    const blob = new Blob([[header.join(','), ...rows].join('\n')], { type: 'text/csv' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'filtered_alerts.csv';
    link.click();
}

// ============================================
// SYSTEM DATE MANAGEMENT
// ============================================

function updateSystemStartDate() {
    const input = document.getElementById('systemStartDate');
    if (input && input.value) {
        state.systemStartDate = input.value;
        localStorage.setItem('statsSystemStartDate', input.value);
        updateSystemInfo();
    }
}

function resetSystemStartDate() {
    state.systemStartDate = '2024-01-01';
    localStorage.removeItem('statsSystemStartDate');
    const input = document.getElementById('systemStartDate');
    if (input) input.value = state.systemStartDate;
    updateSystemInfo();
}

// ============================================
// UI UPDATES
// ============================================

function updateFilterSummary(alerts) {
    const summary = document.getElementById('filterSummary');
    if (!summary) return;

    const fmt = new Intl.NumberFormat();
    const parts = [`<strong>${fmt.format(alerts.length)}</strong> alerts match current filters.`];

    if (state.filters.startDate || state.filters.endDate) {
        const start = state.filters.startDate?.toLocaleDateString() || 'beginning';
        const end = state.filters.endDate?.toLocaleDateString() || 'now';
        parts.push(`<span class="filter-pill"><i class="fas fa-calendar"></i> ${start} - ${end}</span>`);
    }
    if (state.filters.severities.size) {
        parts.push(`<span class="filter-pill"><i class="fas fa-exclamation-triangle"></i> ${[...state.filters.severities].join(', ')}</span>`);
    }

    summary.innerHTML = parts.join(' ');
}

function updateQuickStats(agg) {
    const fmt = new Intl.NumberFormat();

    const els = {
        filteredTotalAlerts: fmt.format(agg.totalAlerts),
        filteredAvgPerDay: agg.avgPerDay?.toFixed(1) || '0',
        filteredTopSeverity: agg.topSeverity || '-',
        filteredTopEvent: agg.topEvent || '-'
    };

    Object.entries(els).forEach(([id, val]) => {
        const el = document.getElementById(id);
        if (el) el.textContent = val;
    });
}

function updateSystemInfo() {
    const timestampEl = document.getElementById('stats-timestamp');
    if (timestampEl) timestampEl.textContent = new Date().toLocaleString();

    const uptimeEl = document.getElementById('uptime-days');
    if (uptimeEl) {
        const startDate = new Date(state.systemStartDate + 'T00:00:00');
        const now = new Date();
        const days = Math.max(0, Math.floor((now - startDate) / (1000 * 60 * 60 * 24)));
        uptimeEl.textContent = days.toLocaleString();
    }

    const startInput = document.getElementById('systemStartDate');
    if (startInput && !startInput.value) {
        startInput.value = state.systemStartDate;
    }
}

// ============================================
// DATA AGGREGATION
// ============================================

function getFilteredAlerts() {
    const start = state.filters.startDate ? new Date(state.filters.startDate) : null;
    const end = state.filters.endDate ? new Date(state.filters.endDate) : null;
    if (start) start.setHours(0, 0, 0, 0);
    if (end) end.setHours(23, 59, 59, 999);

    return baseAlerts.filter(alert => {
        if (start && alert.sentDate < start) return false;
        if (end && alert.sentDate > end) return false;
        if (state.filters.severities.size && !state.filters.severities.has(alert.severity)) return false;
        if (state.filters.statuses.size && !state.filters.statuses.has(alert.status)) return false;
        if (state.filters.events.size && !state.filters.events.has(alert.event)) return false;
        return true;
    });
}

function aggregateAlerts(alerts) {
    const eventCounts = new Map();
    const severityCounts = new Map();
    const statusCounts = new Map();
    const hourlyTotals = Array(24).fill(0);
    const monthlyTotals = Array(12).fill(0);
    const yearlyCounts = new Map();
    const hourlyMatrix = Array.from({ length: 7 }, () => Array(24).fill(0));
    const dailyCounts = new Map();

    alerts.forEach(alert => {
        const sent = alert.sentDate;
        if (!sent) return;

        const dayKey = sent.toISOString().slice(0, 10);
        const hour = sent.getHours();
        const dow = sent.getDay();
        const month = sent.getMonth();
        const year = sent.getFullYear();

        eventCounts.set(alert.event || 'Unknown', (eventCounts.get(alert.event) || 0) + 1);
        severityCounts.set(alert.severity || 'Unknown', (severityCounts.get(alert.severity) || 0) + 1);
        statusCounts.set(alert.status || 'Unknown', (statusCounts.get(alert.status) || 0) + 1);

        hourlyTotals[hour]++;
        hourlyMatrix[dow][hour]++;
        monthlyTotals[month]++;
        yearlyCounts.set(year, (yearlyCounts.get(year) || 0) + 1);
        dailyCounts.set(dayKey, (dailyCounts.get(dayKey) || 0) + 1);
    });

    const dailySeries = [...dailyCounts.entries()]
        .sort((a, b) => new Date(a[0]) - new Date(b[0]))
        .map(([date, count]) => ({ date, count }));

    const alertByEvent = [...eventCounts.entries()]
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10)
        .map(([event, count]) => ({ event, count }));

    const alertBySeverity = [...severityCounts.entries()]
        .sort((a, b) => b[1] - a[1])
        .map(([severity, count]) => ({ severity, count }));

    const alertByStatus = [...statusCounts.entries()]
        .sort((a, b) => b[1] - a[1])
        .map(([status, count]) => ({ status, count }));

    const yearlyTotals = [...yearlyCounts.entries()]
        .sort((a, b) => a[0] - b[0])
        .map(([year, count]) => ({ year, count }));

    const dowTotals = hourlyMatrix.map(row => row.reduce((a, b) => a + b, 0));

    return {
        totalAlerts: alerts.length,
        alertByEvent,
        alertBySeverity,
        alertByStatus,
        hourlyTotals,
        hourlyMatrix,
        dowTotals,
        monthlyTotals,
        yearlyTotals,
        dailySeries,
        recentByDay: dailySeries.slice(-30),
        avgPerDay: dailySeries.length ? dailySeries.reduce((a, b) => a + b.count, 0) / dailySeries.length : 0,
        topSeverity: alertBySeverity[0]?.severity || '-',
        topEvent: alertByEvent[0]?.event || '-'
    };
}

// ============================================
// CHART UTILITIES
// ============================================

function createOrUpdateChart(containerId, factory) {
    const container = document.getElementById(containerId);
    if (!container) return;

    if (state.charts[containerId]) {
        state.charts[containerId].destroy();
    }

    container.innerHTML = '';
    const canvas = document.createElement('canvas');
    container.appendChild(canvas);

    const chart = factory(canvas);
    if (chart) state.charts[containerId] = chart;
}

function showNoData(containerId, message) {
    const container = document.getElementById(containerId);
    if (!container) return;

    if (state.charts[containerId]) {
        state.charts[containerId].destroy();
        delete state.charts[containerId];
    }

    container.innerHTML = `<div class="simple-chart"><i class="fas fa-chart-bar"></i><span>${message}</span></div>`;
}

// ============================================
// CHART CREATION FUNCTIONS
// ============================================

function createAlertTypesChart(agg) {
    const id = 'alertTypesChart';
    if (!document.getElementById(id)) return;
    if (!agg.alertByEvent.length) return showNoData(id, 'No alert data available');

    createOrUpdateChart(id, canvas => {
        const ctx = canvas.getContext('2d');
        return new Chart(canvas, {
            type: 'doughnut',
            data: {
                labels: agg.alertByEvent.map(i => i.event),
                datasets: [{
                    data: agg.alertByEvent.map(i => i.count),
                    backgroundColor: agg.alertByEvent.map((_, i) => {
                        const colors = CHART_GRADIENTS[i % CHART_GRADIENTS.length];
                        return createRadialGradient(ctx, colors);
                    }),
                    borderWidth: 0,
                    hoverOffset: 8
                }]
            },
            options: {
                cutout: '60%',
                plugins: {
                    legend: { position: 'right', labels: { padding: 15, usePointStyle: true } },
                    datalabels: {
                        display: true,
                        color: '#fff',
                        font: { weight: 'bold', size: 11 },
                        formatter: (val, ctx) => {
                            const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                            return `${((val / total) * 100).toFixed(0)}%`;
                        }
                    }
                }
            }
        });
    });
}

function createSeverityChart(agg) {
    const id = 'severityChart';
    if (!document.getElementById(id)) return;
    if (!agg.alertBySeverity.length) return showNoData(id, 'No severity data');

    const severityGradients = {
        'Extreme': GRADIENT_PALETTES.danger,
        'Severe': GRADIENT_PALETTES.orange,
        'Moderate': GRADIENT_PALETTES.warning,
        'Minor': GRADIENT_PALETTES.info,
        'Unknown': ['#94a3b8', '#64748b']
    };

    createOrUpdateChart(id, canvas => {
        const ctx = canvas.getContext('2d');
        return new Chart(canvas, {
            type: 'bar',
            data: {
                labels: agg.alertBySeverity.map(i => i.severity),
                datasets: [{
                    label: 'Alerts',
                    data: agg.alertBySeverity.map(i => i.count),
                    backgroundColor: agg.alertBySeverity.map(i => {
                        const colors = severityGradients[i.severity] || severityGradients.Unknown;
                        return createGradient(ctx, colors);
                    }),
                    borderRadius: 8,
                    borderSkipped: false
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { color: getChartThemeColors().gridLines } },
                    x: { grid: { display: false } }
                }
            }
        });
    });
}

function createStatusChart(agg) {
    const id = 'statusChart';
    if (!document.getElementById(id)) return;
    if (!agg.alertByStatus.length) return showNoData(id, 'No status data');

    createOrUpdateChart(id, canvas => {
        const ctx = canvas.getContext('2d');
        return new Chart(canvas, {
            type: 'pie',
            data: {
                labels: agg.alertByStatus.map(i => i.status),
                datasets: [{
                    data: agg.alertByStatus.map(i => i.count),
                    backgroundColor: agg.alertByStatus.map((_, i) => {
                        const colors = CHART_GRADIENTS[i % CHART_GRADIENTS.length];
                        return createRadialGradient(ctx, colors);
                    }),
                    borderWidth: 2,
                    borderColor: getChartThemeColors().surface
                }]
            },
            options: {
                plugins: {
                    legend: { position: 'right', labels: { padding: 12, usePointStyle: true } },
                    datalabels: {
                        display: true,
                        color: '#fff',
                        font: { weight: 'bold' },
                        formatter: val => val
                    }
                }
            }
        });
    });
}

function createTemporalHeatmapChart(agg) {
    const id = 'temporalHeatmapChart';
    const container = document.getElementById(id);
    if (!container) return;

    const matrix = agg.hourlyMatrix || [];
    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const data = [];
    let maxVal = 0;

    matrix.forEach((row, dow) => {
        row.forEach((val, hour) => {
            data.push({ x: hour, y: dow, v: val || 0 });
            if (val > maxVal) maxVal = val;
        });
    });

    if (!data.some(p => p.v > 0)) return showNoData(id, 'No activity data');

    createOrUpdateChart(id, canvas => new Chart(canvas, {
        type: 'matrix',
        data: {
            datasets: [{
                label: 'Alerts',
                data,
                backgroundColor: ctx => getHeatmapColor(ctx.dataset.data[ctx.dataIndex].v, maxVal),
                borderWidth: 2,
                borderColor: getChartThemeColors().surface,
                borderRadius: 4,
                width: ({ chart }) => (chart.chartArea?.width || 600) / 24 - 3,
                height: ({ chart }) => (chart.chartArea?.height || 300) / 7 - 3
            }]
        },
        options: {
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        title: () => '',
                        label: ctx => {
                            const d = ctx.dataset.data[ctx.dataIndex];
                            return `${dayNames[d.y]} ${d.x}:00 - ${d.v} alerts`;
                        }
                    }
                }
            },
            scales: {
                x: {
                    type: 'linear',
                    min: -0.5,
                    max: 23.5,
                    ticks: { stepSize: 1, callback: v => `${v}:00` },
                    grid: { display: false }
                },
                y: {
                    type: 'linear',
                    min: -0.5,
                    max: 6.5,
                    reverse: true,
                    ticks: { stepSize: 1, callback: v => dayNames[v] },
                    grid: { display: false }
                }
            }
        }
    }));

    // Add legend
    const legendHtml = `
        <div class="heatmap-legend">
            <span>Less</span>
            <div class="heatmap-gradient"></div>
            <span>More</span>
        </div>
    `;
    const legendDiv = document.createElement('div');
    legendDiv.innerHTML = legendHtml;
    container.appendChild(legendDiv);
}

function createHourlyLineChart(agg) {
    const id = 'hourlyLineChart';
    if (!document.getElementById(id)) return;
    if (!agg.hourlyTotals.some(v => v > 0)) return showNoData(id, 'No hourly data');

    const hours = Array.from({ length: 24 }, (_, i) => `${i}:00`);

    createOrUpdateChart(id, canvas => {
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, 'rgba(236, 72, 153, 0.5)');
        gradient.addColorStop(0.5, 'rgba(168, 85, 247, 0.3)');

function createReliabilityGauge() {
    const id = 'reliabilityGauge';
    const container = document.getElementById(id);
    if (!container || !statsData.polling?.success_rate) return;

    const rate = statsData.polling.success_rate;
    const pct = Math.round(rate * 100);
    const color = rate < 0.5 ? GRADIENT_PALETTES.danger : rate < 0.9 ? GRADIENT_PALETTES.warning : GRADIENT_PALETTES.success;

    createOrUpdateChart(id, canvas => {
        const ctx = canvas.getContext('2d');
        return new Chart(canvas, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [rate, 1 - rate],
                    backgroundColor: [createGradient(ctx, color), 'rgba(0,0,0,0.05)'],
                    borderWidth: 0,
                    circumference: 180,
                    rotation: 270
                }]
            },
            options: {
                cutout: '75%',
                plugins: { legend: { display: false }, tooltip: { enabled: false } }
            },
            plugins: [{
                id: 'gaugeText',
                afterDraw(chart) {
                    const { ctx, chartArea: { width, height } } = chart;
                    ctx.save();
                    ctx.font = 'bold 32px Inter, sans-serif';
                    ctx.fillStyle = getChartThemeColors().text;
                    ctx.textAlign = 'center';
                    ctx.fillText(`${pct}%`, width / 2, height / 2 + 30);
                    ctx.font = '14px Inter, sans-serif';
                    ctx.fillStyle = getChartThemeColors().textMuted;
                    ctx.fillText('Reliability', width / 2, height / 2 + 55);
                    ctx.restore();
                }
            }]
        });
    });
}

function renderDynamicCharts(agg) {
    createAlertTypesChart(agg);
    createSeverityChart(agg);
    createStatusChart(agg);
    createTemporalHeatmapChart(agg);
    createHourlyLineChart(agg);
    createDayOfWeekChart(agg);
    createMonthlyChart(agg);
    createYearlyTrendChart(agg);
    createRecentActivityChart(agg);
}

function renderStaticCharts() {
    createAffectedAreasChart();
    createBoundaryTypesChart();
    createReliabilityGauge();
    createDurationChart();
}

function updateDashboard() {
    state.filteredAlerts = getFilteredAlerts();
    updateFilterSummary(state.filteredAlerts);
    state.aggregates = aggregateAlerts(state.filteredAlerts);
    updateQuickStats(state.aggregates);
    renderDynamicCharts(state.aggregates);

    if (!state.staticChartsInitialized) {
        renderStaticCharts();
        state.staticChartsInitialized = true;
    }
}

// ============================================
// INITIALIZATION
// ============================================

function initializeFilters() {
    populateFilterSelect('severityFilter', statsData.filterOptions.severities || []);
    populateFilterSelect('statusFilter', statsData.filterOptions.statuses || []);
    populateFilterSelect('eventFilter', statsData.filterOptions.events || []);

    document.getElementById('dateRangePreset')?.addEventListener('change', handlePresetChange);
    document.getElementById('applyFiltersBtn')?.addEventListener('click', applyFiltersFromInputs);
    document.getElementById('resetFiltersBtn')?.addEventListener('click', resetFilters);
    document.getElementById('exportDashboardBtn')?.addEventListener('click', exportFilteredData);
    document.getElementById('updateStartDateBtn')?.addEventListener('click', updateSystemStartDate);
    document.getElementById('resetStartDateBtn')?.addEventListener('click', resetSystemStartDate);

    setPresetDates('last30');
}

function initializeDashboard() {
    if (window.__statsDashboardInitialized) return;
    window.__statsDashboardInitialized = true;

    initializeFilters();
    updateSystemInfo();
    updateDashboard();

    console.log('Dashboard ready');
}

document.addEventListener('DOMContentLoaded', () => {
    try {
        initializeDashboard();
    } catch (error) {
        console.error('Dashboard initialization failed:', error);
        const root = document.getElementById('statisticsDashboardRoot');
        if (root) {
            root.innerHTML = `<div class="alert alert-danger m-3"><strong>Dashboard Error:</strong> ${error.message}</div>`;
        }
    }
});

// Theme change listener
window.addEventListener('theme-changed', () => {
    applyChartTheme();
    Object.values(state.charts).forEach(c => c?.destroy());
    state.charts = {};
    state.staticChartsInitialized = false;
    if (state.aggregates) updateDashboard();
});
</script>
