<style>
    /* ============================================
       MODERN GLASS MORPHISM STATS DASHBOARD
       ============================================ */

    :root {
        --glass-bg: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.18);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        --glass-blur: blur(12px);
        --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --gradient-success: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        --gradient-danger: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        --gradient-warning: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        --gradient-info: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        --gradient-purple: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
        --gradient-teal: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
        --gradient-orange: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
        --gradient-dark: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
        --card-radius: 20px;
        --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme-mode="dark"] {
        --glass-bg: rgba(30, 41, 59, 0.6);
        --glass-border: rgba(148, 163, 184, 0.2);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    /* Page Header */
    .stats-page-header {
        background: var(--gradient-primary);
        border-radius: var(--card-radius);
        padding: 2rem 2.5rem;
        margin-bottom: 2rem;
        color: white;
        position: relative;
        overflow: hidden;
    }

    .stats-page-header::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -20%;
        width: 60%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
        pointer-events: none;
    }

    .stats-page-header h1 {
        font-size: 2rem;
        font-weight: 700;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        position: relative;
        z-index: 1;
    }

    .stats-page-header small {
        display: block;
        margin-top: 0.5rem;
        opacity: 0.9;
        font-weight: 400;
    }

    .stats-page-header .header-actions {
        position: absolute;
        right: 2rem;
        top: 50%;
        transform: translateY(-50%);
        z-index: 1;
    }

    .stats-page-header .btn {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        backdrop-filter: blur(8px);
    }

    .stats-page-header .btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
    }

    /* Stat Cards - Glassmorphism */
    .stat-card {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: var(--card-radius);
        padding: 1.75rem;
        text-align: center;
        margin-bottom: 1.5rem;
        box-shadow: var(--glass-shadow);
        transition: var(--transition-smooth);
        position: relative;
        overflow: hidden;
    }

    .stat-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        border-radius: var(--card-radius) var(--card-radius) 0 0;
    }

    .stat-card:hover {
        transform: translateY(-6px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    .stat-card.green::before { background: var(--gradient-success); }
    .stat-card.red::before { background: var(--gradient-danger); }
    .stat-card.orange::before { background: var(--gradient-warning); }
    .stat-card.blue::before { background: var(--gradient-info); }
    .stat-card.purple::before { background: var(--gradient-purple); }
    .stat-card.teal::before { background: var(--gradient-teal); }

    .stat-card.green .stat-number { background: var(--gradient-success); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-card.red .stat-number { background: var(--gradient-danger); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-card.orange .stat-number { background: var(--gradient-warning); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-card.blue .stat-number { background: var(--gradient-info); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-card.purple .stat-number { background: var(--gradient-purple); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-card.teal .stat-number { background: var(--gradient-teal); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .stat-number {
        font-size: 2.75rem;
        font-weight: 800;
        margin-bottom: 0.25rem;
        line-height: 1.1;
    }

    .stat-label {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-color);
        margin-bottom: 0.25rem;
    }

    .stat-subtitle {
        font-size: 0.85rem;
        color: var(--text-muted);
    }

    .stat-icon {
        position: absolute;
        top: 1rem;
        right: 1rem;
        font-size: 2.5rem;
        opacity: 0.1;
    }

    .stat-sparkline {
        height: 50px;
        margin-top: 1rem;
    }

    /* Section Headers */
    .section-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 2.5rem 0 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid transparent;
        border-image: var(--gradient-primary) 1;
        font-weight: 700;
        font-size: 1.5rem;
        color: var(--text-color);
    }

    .section-header i {
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* Chart Container - Glass Effect */
    .chart-container {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: var(--card-radius);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: var(--glass-shadow);
        min-height: 380px;
        transition: var(--transition-smooth);
    }

    .chart-container:hover {
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }

    .chart-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-color);
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .chart-title i {
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .chart-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    .chart-grid-large {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    .chart-grid-small {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    /* Loading State */
    .loading-message {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 300px;
        color: var(--text-muted);
        flex-direction: column;
        gap: 1rem;
    }

    .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--glass-border);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        background: var(--gradient-primary);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        padding: 3px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Filters Panel - Glass */
    .filters-panel {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: var(--card-radius);
        padding: 1.5rem 2rem;
        margin-bottom: 2rem;
        box-shadow: var(--glass-shadow);
    }

    .filters-panel h3 {
        margin: 0 0 1.25rem;
        font-size: 1.1rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-color);
    }

    .filters-panel h3 i {
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .filters-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 1rem;
    }

    .filters-panel label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 0.4rem;
    }

    .filters-panel select,
    .filters-panel input {
        width: 100%;
        padding: 0.6rem 0.9rem;
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        background: var(--surface-color);
        color: var(--text-color);
        font-size: 0.9rem;
        transition: var(--transition-smooth);
    }

    .filters-panel select:focus,
    .filters-panel input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    .filters-actions {
        display: flex;
        gap: 0.75rem;
        margin-top: 1.25rem;
        flex-wrap: wrap;
    }

    .filters-actions button {
        padding: 0.7rem 1.25rem;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: var(--transition-smooth);
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .filters-actions button.apply {
        background: var(--gradient-primary);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .filters-actions button.apply:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    .filters-actions button.reset {
        background: var(--glass-bg);
        color: var(--text-color);
        border: 1px solid var(--glass-border);
    }

    .filters-actions button.reset:hover {
        background: var(--surface-color);
    }

    .filter-summary {
        margin-top: 1rem;
        font-size: 0.9rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
    }

    .filter-pill {
        background: var(--gradient-primary);
        color: white;
        border-radius: 20px;
        padding: 0.35rem 0.9rem;
        font-size: 0.8rem;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
    }

    /* Quick Stats Row */
    .quick-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 1rem;
        margin: 1.5rem 0;
    }

    .quick-stat {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        padding: 1.25rem;
        text-align: center;
        transition: var(--transition-smooth);
    }

    .quick-stat:hover {
        transform: translateY(-3px);
    }

    .quick-stat-number {
        font-size: 1.6rem;
        font-weight: 700;
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.25rem;
    }

    .quick-stat-label {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-weight: 500;
    }

    /* Data Tables */
    .data-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 1rem;
    }

    .data-table th {
        background: var(--gradient-primary);
        color: white;
        font-weight: 600;
        padding: 1rem;
        text-align: left;
    }

    .data-table th:first-child {
        border-radius: 12px 0 0 0;
    }

    .data-table th:last-child {
        border-radius: 0 12px 0 0;
    }

    .data-table td {
        padding: 0.9rem 1rem;
        border-bottom: 1px solid var(--glass-border);
        color: var(--text-color);
    }

    .data-table tr:hover td {
        background: var(--glass-bg);
    }

    .data-table tr:last-child td:first-child {
        border-radius: 0 0 0 12px;
    }

    .data-table tr:last-child td:last-child {
        border-radius: 0 0 12px 0;
    }

    /* Impact Badges */
    .impact-badge {
        padding: 0.4rem 0.9rem;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
        display: inline-block;
    }

    .impact-high {
        background: var(--gradient-danger);
        color: white;
    }

    .impact-medium {
        background: var(--gradient-warning);
        color: white;
    }

    .impact-low {
        background: var(--gradient-success);
        color: white;
    }

    /* Settings Panel */
    .settings-panel {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: var(--card-radius);
        padding: 1.5rem 2rem;
        margin-bottom: 2rem;
    }

    .settings-panel h4 {
        margin: 0 0 1rem;
        font-size: 1rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-color);
    }

    .settings-row {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
    }

    .settings-row label {
        font-size: 0.9rem;
        color: var(--text-muted);
        min-width: 120px;
    }

    .settings-row input[type="date"] {
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        background: var(--surface-color);
        color: var(--text-color);
    }

    .settings-row .btn-sm {
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
    }

    /* Analytics Section */
    .analytics-section {
        margin-top: 2.5rem;
    }

    .timeline-annotations {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 0.75rem;
        padding: 0.75rem 1rem;
        background: var(--glass-bg);
        border-radius: 10px;
        border-left: 3px solid #667eea;
    }

    /* Lifecycle Legend */
    .lifecycle-legend {
        display: flex;
        gap: 1.25rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
        padding: 0.75rem 1rem;
        background: var(--glass-bg);
        border-radius: 10px;
    }

    .lifecycle-legend span {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.85rem;
        color: var(--text-muted);
    }

    .legend-dot {
        width: 14px;
        height: 14px;
        border-radius: 4px;
        display: inline-block;
    }

    /* Heatmap Specific Styles */
    .heatmap-legend {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 1rem;
        font-size: 0.8rem;
        color: var(--text-muted);
    }

    .heatmap-gradient {
        width: 200px;
        height: 12px;
        border-radius: 6px;
        background: linear-gradient(90deg,
            rgba(102, 126, 234, 0.1) 0%,
            rgba(102, 126, 234, 0.3) 25%,
            rgba(102, 126, 234, 0.5) 50%,
            rgba(102, 126, 234, 0.75) 75%,
            rgba(102, 126, 234, 1) 100%
        );
    }

    /* Footer */
    .stats-footer {
        text-align: center;
        padding: 2rem;
        margin-top: 2rem;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .stats-footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
    }

    .stats-footer a:hover {
        text-decoration: underline;
    }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
        .stats-page-header {
            padding: 1.5rem;
        }

        .stats-page-header h1 {
            font-size: 1.5rem;
        }

        .stats-page-header .header-actions {
            position: static;
            transform: none;
            margin-top: 1rem;
        }

        .stat-number {
            font-size: 2rem;
        }

        .chart-grid {
            grid-template-columns: 1fr;
        }

        .filters-grid {
            grid-template-columns: 1fr 1fr;
        }
    }

    /* No Data State */
    .simple-chart {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 300px;
        color: var(--text-muted);
        gap: 0.75rem;
    }

    .simple-chart i {
        font-size: 2.5rem;
        opacity: 0.5;
    }

    /* Animations */
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .stat-card,
    .chart-container,
    .quick-stat {
        animation: fadeInUp 0.5s ease-out forwards;
    }

    .stat-card:nth-child(1) { animation-delay: 0.05s; }
    .stat-card:nth-child(2) { animation-delay: 0.1s; }
    .stat-card:nth-child(3) { animation-delay: 0.15s; }
    .stat-card:nth-child(4) { animation-delay: 0.2s; }
    .stat-card:nth-child(5) { animation-delay: 0.25s; }
    .stat-card:nth-child(6) { animation-delay: 0.3s; }
</style>
