{% extends "base.html" %}

{% block title %}System Logs - EAS Station{% endblock %}

{% block head %}
<style>
    .log-viewer {
        background: var(--bg-color);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 1rem;
    }
    
    .log-controls {
        margin-bottom: 1rem;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
    }
    
    .log-entry {
        font-family: 'Courier New', monospace;
        font-size: 0.85rem;
        padding: 0.5rem;
        border-bottom: 1px solid var(--border-color);
        word-wrap: break-word;
    }
    
    .log-entry:hover {
        background: var(--hover-bg);
    }
    
    .log-timestamp {
        color: var(--text-muted);
        margin-right: 1rem;
    }
    
    .log-priority-0,
    .log-priority-1,
    .log-priority-2,
    .log-priority-3 {
        color: #dc3545;
        font-weight: bold;
    }
    
    .log-priority-4 {
        color: #ffc107;
    }
    
    .log-priority-5,
    .log-priority-6 {
        color: var(--text-color);
    }
    
    .log-priority-7 {
        color: var(--text-muted);
    }
    
    .log-message {
        word-break: break-word;
    }
    
    .log-container {
        max-height: 600px;
        overflow-y: auto;
        background: var(--bg-color);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 0.5rem;
    }
    
    .auto-scroll {
        border: 2px solid var(--primary-color);
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-12">
            <h2><i class="fas fa-file-alt"></i> System Logs (Systemd Journal)</h2>
            <p class="text-muted">View systemd service logs in real-time</p>
        </div>
    </div>
    
    <div class="row mt-3">
        <div class="col-12">
            <div class="log-viewer">
                <div class="log-controls">
                    <div>
                        <label for="serviceSelect" class="form-label">Service:</label>
                        <select id="serviceSelect" class="form-select form-select-sm" style="width: 300px;">
                            <option value="all">All EAS Station Services</option>
                            {% for service in services %}
                            <option value="{{ service }}">{{ service }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div>
                        <label for="linesSelect" class="form-label">Lines:</label>
                        <select id="linesSelect" class="form-select form-select-sm" style="width: 100px;">
                            <option value="50">50</option>
                            <option value="100" selected>100</option>
                            <option value="250">250</option>
                            <option value="500">500</option>
                            <option value="1000">1000</option>
                        </select>
                    </div>
                    
                    <div>
                        <label for="prioritySelect" class="form-label">Priority:</label>
                        <select id="prioritySelect" class="form-select form-select-sm" style="width: 150px;">
                            <option value="">All</option>
                            <option value="err">Error</option>
                            <option value="warning">Warning</option>
                            <option value="info">Info</option>
                            <option value="debug">Debug</option>
                        </select>
                    </div>
                    
                    <div>
                        <label for="sinceSelect" class="form-label">Since:</label>
                        <select id="sinceSelect" class="form-select form-select-sm" style="width: 150px;">
                            <option value="">All Time</option>
                            <option value="1 hour ago">Last Hour</option>
                            <option value="today" selected>Today</option>
                            <option value="yesterday">Yesterday</option>
                            <option value="1 week ago">Last Week</option>
                        </select>
                    </div>
                    
                    <div class="ms-auto">
                        <button id="refreshBtn" class="btn btn-primary btn-sm">
                            <i class="fas fa-sync"></i> Refresh
                        </button>
                        <button id="autoScrollBtn" class="btn btn-secondary btn-sm">
                            <i class="fas fa-arrow-down"></i> Auto-scroll
                        </button>
                        <button id="clearBtn" class="btn btn-secondary btn-sm">
                            <i class="fas fa-eraser"></i> Clear
                        </button>
                    </div>
                </div>
                
                <div id="logContainer" class="log-container">
                    <div class="text-center text-muted py-5">
                        <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
                        <p>Loading logs...</p>
                    </div>
                </div>
                
                <div class="mt-2 text-muted small">
                    <span id="logCount">0</span> log entries shown
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let autoScroll = false;
let refreshInterval = null;

function formatTimestamp(timestamp) {
    if (!timestamp) return '';
    // Convert microseconds to milliseconds
    const ms = parseInt(timestamp) / 1000;
    const date = new Date(ms);
    return date.toLocaleString();
}

function getPriorityClass(priority) {
    return `log-priority-${priority}`;
}

function renderLogs(data) {
    const container = document.getElementById('logContainer');
    const service = document.getElementById('serviceSelect').value;
    
    if (service === 'all') {
        // Render logs from all services
        container.innerHTML = '';
        let totalLogs = 0;
        
        for (const [serviceName, result] of Object.entries(data)) {
            if (result.success && result.logs && result.logs.length > 0) {
                const serviceHeader = document.createElement('div');
                serviceHeader.className = 'log-entry fw-bold';
                serviceHeader.style.background = 'var(--primary-color)';
                serviceHeader.style.color = 'white';
                serviceHeader.textContent = `=== ${serviceName} ===`;
                container.appendChild(serviceHeader);
                
                result.logs.forEach(log => {
                    const logEntry = document.createElement('div');
                    logEntry.className = `log-entry ${getPriorityClass(log.priority)}`;
                    logEntry.innerHTML = `
                        <span class="log-timestamp">${formatTimestamp(log.timestamp)}</span>
                        <span class="log-message">${escapeHtml(log.message)}</span>
                    `;
                    container.appendChild(logEntry);
                    totalLogs++;
                });
            }
        }
        
        if (totalLogs === 0) {
            container.innerHTML = '<div class="text-center text-muted py-5">No logs found for the selected criteria</div>';
        }
        
        document.getElementById('logCount').textContent = totalLogs;
    } else {
        // Render logs from single service
        if (data.success) {
            container.innerHTML = '';
            
            if (!data.logs || data.logs.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-5">No logs found for the selected criteria</div>';
                document.getElementById('logCount').textContent = '0';
                return;
            }
            
            data.logs.forEach(log => {
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry ${getPriorityClass(log.priority)}`;
                logEntry.innerHTML = `
                    <span class="log-timestamp">${formatTimestamp(log.timestamp)}</span>
                    <span class="log-message">${escapeHtml(log.message)}</span>
                `;
                container.appendChild(logEntry);
            });
            
            document.getElementById('logCount').textContent = data.logs.length;
        } else {
            container.innerHTML = `<div class="alert alert-danger">Error: ${escapeHtml(data.error)}</div>`;
            document.getElementById('logCount').textContent = '0';
        }
    }
    
    if (autoScroll) {
        container.scrollTop = container.scrollHeight;
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function fetchLogs() {
    const service = document.getElementById('serviceSelect').value;
    const lines = document.getElementById('linesSelect').value;
    const priority = document.getElementById('prioritySelect').value;
    const since = document.getElementById('sinceSelect').value;
    
    let url;
    if (service === 'all') {
        url = `/api/logs/all?lines=${lines}`;
    } else {
        url = `/api/logs/${service}?lines=${lines}`;
    }
    
    if (priority) url += `&priority=${priority}`;
    if (since) url += `&since=${encodeURIComponent(since)}`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        renderLogs(data);
    } catch (error) {
        console.error('Error fetching logs:', error);
        document.getElementById('logContainer').innerHTML = 
            `<div class="alert alert-danger">Error fetching logs: ${error.message}</div>`;
    }
}

document.getElementById('refreshBtn').addEventListener('click', fetchLogs);

document.getElementById('serviceSelect').addEventListener('change', fetchLogs);
document.getElementById('linesSelect').addEventListener('change', fetchLogs);
document.getElementById('prioritySelect').addEventListener('change', fetchLogs);
document.getElementById('sinceSelect').addEventListener('change', fetchLogs);

document.getElementById('autoScrollBtn').addEventListener('click', function() {
    autoScroll = !autoScroll;
    const container = document.getElementById('logContainer');
    const btn = this;
    
    if (autoScroll) {
        btn.classList.remove('btn-secondary');
        btn.classList.add('btn-success');
        container.classList.add('auto-scroll');
        container.scrollTop = container.scrollHeight;
        
        // Auto-refresh every 5 seconds when auto-scroll is on
        if (!refreshInterval) {
            refreshInterval = setInterval(fetchLogs, 5000);
        }
    } else {
        btn.classList.remove('btn-success');
        btn.classList.add('btn-secondary');
        container.classList.remove('auto-scroll');
        
        if (refreshInterval) {
            clearInterval(refreshInterval);
            refreshInterval = null;
        }
    }
});

document.getElementById('clearBtn').addEventListener('click', function() {
    document.getElementById('logContainer').innerHTML = 
        '<div class="text-center text-muted py-5">Logs cleared. Click Refresh to reload.</div>';
    document.getElementById('logCount').textContent = '0';
});

// Initial load
fetchLogs();
</script>
{% endblock %}
