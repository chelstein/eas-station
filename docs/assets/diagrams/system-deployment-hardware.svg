<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">EAS Station System Deployment — Hardware Architecture</title>
  <desc id="desc">Physical deployment diagram showing Raspberry Pi 5 reference configuration with USB peripherals, GPIO relay HAT, NVMe SSD storage, software services, and external connections.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#061826" />
      <stop offset="100%" stop-color="#0f2d46" />
    </linearGradient>
    <linearGradient id="pi-hdr" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#831843" />
      <stop offset="100%" stop-color="#be185d" />
    </linearGradient>
    <linearGradient id="svc" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f4b70" />
      <stop offset="100%" stop-color="#15334e" />
    </linearGradient>
    <linearGradient id="db" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f4c5c" />
      <stop offset="100%" stop-color="#0e7490" />
    </linearGradient>
    <linearGradient id="redis" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7f1d1d" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    <linearGradient id="store" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#3b0764" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <linearGradient id="usb" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#14532d" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>
    <linearGradient id="gpio" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4c1d95" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <linearGradient id="ext" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#78350f" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="net" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <marker id="arrow-usb" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#86efac" />
    </marker>
    <marker id="arrow-gpio" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#c4b5fd" />
    </marker>
    <marker id="arrow-net" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#93c5fd" />
    </marker>
    <marker id="arrow-pcie" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#a78bfa" />
    </marker>
    <marker id="arrow-ext" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#fbbf24" />
    </marker>
    <marker id="arrow-audio" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#5eead4" />
    </marker>

    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #f4f7fb; }
      .headline { font-size: 26px; font-weight: 700; }
      .subtitle { font-size: 13px; fill: #93c5fd; }
      .panel-title { font-size: 13px; font-weight: 600; }
      .sm { font-size: 11px; fill: #d4e7ff; }
      .xs { font-size: 10px; fill: #b8d9f9; }
      .label { font-size: 10px; fill: #93c5fd; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" rx="0" fill="url(#bg)" />

  <!-- Title -->
  <text x="600" y="40" class="headline" text-anchor="middle">EAS Station Hardware Deployment</text>
  <text x="600" y="62" class="subtitle" text-anchor="middle">Raspberry Pi 5 Reference Architecture · ~$585 vs $5,000–$7,000 for commercial EAS hardware (~90% savings)</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  RASPBERRY PI 5 CENTRAL CONTAINER              -->
  <!--  x=245 y=78 w=570 h=606                        -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="245" y="78" width="570" height="606" rx="16" fill="#071e33" stroke="#49b3ff" stroke-width="2"/>

  <!-- Pi 5 Header -->
  <rect x="245" y="78" width="570" height="52" rx="16" fill="url(#pi-hdr)"/>
  <rect x="245" y="108" width="570" height="22" fill="url(#pi-hdr)"/>
  <text x="530" y="101" class="panel-title" text-anchor="middle" style="font-size:17px">Raspberry Pi 5 (8GB)</text>
  <text x="530" y="120" class="xs" text-anchor="middle" style="fill:#fce7f3">BCM2712 · Cortex-A76 @ 2.4 GHz · 8 GB LPDDR4X · systemd service management</text>

  <!-- ──── Row 1: Software Services (y=140-252) ──── -->

  <!-- Web App -->
  <g transform="translate(255,140)">
    <rect width="175" height="105" rx="8" fill="url(#svc)" stroke="#49b3ff" stroke-width="1.5"/>
    <text x="87" y="22" class="panel-title" text-anchor="middle">eas-station-web</text>
    <text x="87" y="40" class="sm" text-anchor="middle">Flask / Gunicorn</text>
    <text x="87" y="57" class="xs" text-anchor="middle">Port 5000 · Web UI &amp; REST API</text>
    <text x="87" y="73" class="xs" text-anchor="middle">EAS workflow · Alert maps</text>
    <text x="87" y="89" class="xs" text-anchor="middle">RBAC · Analytics · Audit logs</text>
  </g>

  <!-- CAP Poller -->
  <g transform="translate(440,140)">
    <rect width="170" height="105" rx="8" fill="url(#svc)" stroke="#49b3ff" stroke-width="1.5"/>
    <text x="85" y="22" class="panel-title" text-anchor="middle">eas-station-poller</text>
    <text x="85" y="40" class="sm" text-anchor="middle">CAP Poller (NOAA + FEMA)</text>
    <text x="85" y="57" class="xs" text-anchor="middle">api.weather.gov · IPAWS</text>
    <text x="85" y="73" class="xs" text-anchor="middle">XML parse · dedup</text>
    <text x="85" y="89" class="xs" text-anchor="middle">Spatial processing · PostGIS</text>
  </g>

  <!-- SDR / Hardware / Audio services -->
  <g transform="translate(620,140)">
    <rect width="185" height="105" rx="8" fill="url(#svc)" stroke="#49b3ff" stroke-width="1.5"/>
    <text x="92" y="22" class="panel-title" text-anchor="middle">Hardware Services</text>
    <text x="92" y="40" class="sm" text-anchor="middle" style="fill:#93c5fd">eas-station-sdr</text>
    <text x="92" y="56" class="xs" text-anchor="middle">FM demod · SAME decode · Icecast</text>
    <text x="92" y="72" class="sm" text-anchor="middle" style="fill:#93c5fd">eas-station-hardware</text>
    <text x="92" y="88" class="xs" text-anchor="middle">GPIO relay · OLED/VFD · Port 5001</text>
  </g>

  <!-- ──── Row 2: Database (y=258-348) ──── -->
  <g transform="translate(255,258)">
    <rect width="550" height="85" rx="8" fill="url(#db)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="275" y="25" class="panel-title" text-anchor="middle">PostgreSQL 17 + PostGIS 3.4 · Port 5432</text>
    <text x="275" y="44" class="sm" text-anchor="middle">CAP Alerts · Boundaries · Receivers · EAS Messages · Audio Sources · GPIO Logs</text>
    <text x="275" y="62" class="xs" text-anchor="middle">Spatial intelligence · Analytics · MetricSnapshot · TrendRecord · AnomalyRecord · AuditLog</text>
  </g>

  <!-- ──── Row 3: Redis (y=352-412) ──── -->
  <g transform="translate(255,352)">
    <rect width="550" height="55" rx="8" fill="url(#redis)" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="275" y="23" class="panel-title" text-anchor="middle">Redis · Port 6379 · Inter-Service Cache</text>
    <text x="275" y="41" class="xs" text-anchor="middle">eas:audio:metrics · eas:waveform:* · eas:spectrogram:* · eas:commands (Pub/Sub) · 5-second TTL</text>
  </g>

  <!-- ──── Row 4: NVMe SSD (y=416-496) ──── -->
  <g transform="translate(255,416)">
    <rect width="550" height="78" rx="8" fill="url(#store)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="275" y="25" class="panel-title" text-anchor="middle">NVMe SSD Storage · PCIe Gen 2.0 · 256 GB+ recommended</text>
    <text x="275" y="44" class="sm" text-anchor="middle">pgdata · static/audio · iq_captures · logs · backups</text>
    <text x="275" y="62" class="xs" text-anchor="middle">Mounted via PCIe HAT+ · sequential write critical for IQ capture and audio recording</text>
  </g>

  <!-- ──── Row 5: Cost + Legend (y=504-664) ──── -->

  <!-- Cost box -->
  <g transform="translate(255,503)">
    <rect width="175" height="170" rx="8" fill="#071e33" stroke="#49b3ff" stroke-width="1"/>
    <text x="87" y="22" class="sm" text-anchor="middle" style="fill:#93c5fd; font-weight:600">Total Cost</text>
    <text x="87" y="52" class="panel-title" text-anchor="middle" style="font-size:28px; fill:#86efac">~$585</text>
    <text x="87" y="72" class="xs" text-anchor="middle">vs. DASDEC3 $5,000–$7,000</text>
    <text x="87" y="88" class="xs" text-anchor="middle" style="fill:#86efac; font-weight:600">~90% savings</text>
    <line x1="15" y1="100" x2="160" y2="100" stroke="#49b3ff" stroke-width="0.5"/>
    <text x="87" y="118" class="xs" text-anchor="middle">RPi 5 8GB ~$80</text>
    <text x="87" y="134" class="xs" text-anchor="middle">NVMe SSD 256GB ~$40</text>
    <text x="87" y="150" class="xs" text-anchor="middle">RTL-SDR v3 ~$30</text>
    <text x="87" y="166" class="xs" text-anchor="middle">Accessories ~$435</text>
  </g>

  <!-- Connection Legend -->
  <g transform="translate(440,503)">
    <rect width="365" height="170" rx="8" fill="#071e33" stroke="#49b3ff" stroke-width="1"/>
    <text x="182" y="22" class="sm" text-anchor="middle" style="fill:#93c5fd; font-weight:600">Connection Legend</text>
    <!-- USB -->
    <line x1="20" y1="44" x2="65" y2="44" stroke="#86efac" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrow-usb)"/>
    <text x="75" y="48" class="xs">USB 2.0/3.0 (SDR receivers, Audio DAC)</text>
    <!-- GPIO -->
    <line x1="20" y1="66" x2="65" y2="66" stroke="#c4b5fd" stroke-width="2.5" marker-end="url(#arrow-gpio)"/>
    <text x="75" y="70" class="xs">GPIO 40-pin (relay HAT, PTT, LEDs)</text>
    <!-- Network -->
    <line x1="20" y1="88" x2="65" y2="88" stroke="#93c5fd" stroke-width="2.5" marker-end="url(#arrow-net)"/>
    <text x="75" y="92" class="xs">Gigabit Ethernet (Internet, operator UI)</text>
    <!-- PCIe -->
    <line x1="20" y1="110" x2="65" y2="110" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrow-pcie)"/>
    <text x="75" y="114" class="xs">PCIe Gen 2.0 x1 (NVMe SSD HAT+)</text>
    <!-- Audio balanced -->
    <line x1="20" y1="132" x2="65" y2="132" stroke="#5eead4" stroke-width="2.5" marker-end="url(#arrow-audio)"/>
    <text x="75" y="136" class="xs">Balanced audio out (USB DAC → amplifier)</text>
    <!-- External -->
    <line x1="20" y1="154" x2="65" y2="154" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arrow-ext)"/>
    <text x="75" y="158" class="xs">External connections (broadcast, display, web)</text>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  LEFT USB PERIPHERALS (x=20-225)               -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- RTL-SDR v3 -->
  <g transform="translate(20,148)">
    <rect width="205" height="95" rx="8" fill="url(#usb)" stroke="#86efac" stroke-width="1.5"/>
    <text x="102" y="22" class="panel-title" text-anchor="middle">RTL-SDR v3</text>
    <text x="102" y="40" class="sm" text-anchor="middle">USB 2.0/3.0 · RTL2832U</text>
    <text x="102" y="57" class="xs" text-anchor="middle">162 MHz NOAA WX · 24 MHz–1.7 GHz</text>
    <text x="102" y="73" class="xs" text-anchor="middle">2.4 MSPS · /dev/bus/usb</text>
  </g>
  <line x1="225" y1="195" x2="245" y2="195" stroke="#86efac" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-usb)"/>

  <!-- Airspy Mini -->
  <g transform="translate(20,263)">
    <rect width="205" height="85" rx="8" fill="url(#usb)" stroke="#86efac" stroke-width="1.5"/>
    <text x="102" y="22" class="panel-title" text-anchor="middle">Airspy Mini (optional)</text>
    <text x="102" y="40" class="sm" text-anchor="middle">USB 2.0/3.0 · Backup SDR</text>
    <text x="102" y="57" class="xs" text-anchor="middle">24 MHz–1.8 GHz · 6 MSPS</text>
    <text x="102" y="72" class="xs" text-anchor="middle">/dev/bus/usb · higher performance</text>
  </g>
  <line x1="225" y1="305" x2="245" y2="305" stroke="#86efac" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-usb)"/>

  <!-- USB Audio DAC -->
  <g transform="translate(20,368)">
    <rect width="205" height="85" rx="8" fill="url(#usb)" stroke="#86efac" stroke-width="1.5"/>
    <text x="102" y="22" class="panel-title" text-anchor="middle">USB Audio DAC</text>
    <text x="102" y="40" class="sm" text-anchor="middle">ALSA hw:1,0 · USB 2.0</text>
    <text x="102" y="57" class="xs" text-anchor="middle">Balanced output · I²S/USB</text>
    <text x="102" y="72" class="xs" text-anchor="middle">SAME tones · TTS narration</text>
  </g>
  <line x1="225" y1="410" x2="245" y2="410" stroke="#86efac" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-usb)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  RIGHT PERIPHERALS (x=815-1090)                -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- GPIO Relay HAT -->
  <g transform="translate(825,148)">
    <rect width="210" height="95" rx="8" fill="url(#gpio)" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="105" y="22" class="panel-title" text-anchor="middle">GPIO Relay HAT</text>
    <text x="105" y="40" class="sm" text-anchor="middle">40-pin header · Multi-relay</text>
    <text x="105" y="57" class="xs" text-anchor="middle">PTT (push-to-talk FM TX)</text>
    <text x="105" y="73" class="xs" text-anchor="middle">LED sign power · GPIO control</text>
  </g>
  <line x1="815" y1="195" x2="825" y2="195" stroke="#c4b5fd" stroke-width="2" marker-end="url(#arrow-gpio)"/>

  <!-- Gigabit Ethernet -->
  <g transform="translate(825,263)">
    <rect width="210" height="85" rx="8" fill="url(#net)" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="105" y="22" class="panel-title" text-anchor="middle">Gigabit Ethernet</text>
    <text x="105" y="40" class="sm" text-anchor="middle">RJ45 · 1000 Mbps</text>
    <text x="105" y="57" class="xs" text-anchor="middle">CAP feed polling · operator web UI</text>
    <text x="105" y="72" class="xs" text-anchor="middle">nginx HTTPS · Icecast streams</text>
  </g>
  <line x1="815" y1="305" x2="825" y2="305" stroke="#93c5fd" stroke-width="2" marker-end="url(#arrow-net)"/>

  <!-- PCIe HAT+ -->
  <g transform="translate(825,368)">
    <rect width="210" height="85" rx="8" fill="url(#store)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="105" y="22" class="panel-title" text-anchor="middle">PCIe HAT+</text>
    <text x="105" y="40" class="sm" text-anchor="middle">PCIe Gen 2.0 x1</text>
    <text x="105" y="57" class="xs" text-anchor="middle">M.2 NVMe SSD slot</text>
    <text x="105" y="72" class="xs" text-anchor="middle">~500 MB/s sequential</text>
  </g>
  <line x1="815" y1="410" x2="825" y2="410" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-pcie)"/>

  <!-- OLED/VFD Display (optional) -->
  <g transform="translate(825,473)">
    <rect width="210" height="75" rx="8" fill="url(#gpio)" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="105" y="22" class="panel-title" text-anchor="middle">OLED / VFD Display</text>
    <text x="105" y="40" class="sm" text-anchor="middle">I²C · optional</text>
    <text x="105" y="58" class="xs" text-anchor="middle">Status display · scroll effects</text>
  </g>
  <line x1="815" y1="510" x2="825" y2="510" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gpio)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  BOTTOM EXTERNAL CONNECTIONS                   -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- FM Transmitter -->
  <g transform="translate(50,740)">
    <rect width="175" height="80" rx="8" fill="url(#ext)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="87" y="24" class="panel-title" text-anchor="middle">FM Transmitter</text>
    <text x="87" y="42" class="sm" text-anchor="middle">EAS broadcast · PTT relay</text>
    <text x="87" y="58" class="xs" text-anchor="middle">GPIO → relay → RF transmit</text>
  </g>
  <!-- FM → Pi bottom left (GPIO relay controls PTT) -->
  <path d="M 137,740 V 684" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gpio)"/>
  <text x="145" y="716" class="label" style="fill:#c4b5fd">PTT</text>

  <!-- LED Sign -->
  <g transform="translate(250,740)">
    <rect width="175" height="80" rx="8" fill="url(#ext)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="87" y="24" class="panel-title" text-anchor="middle">LED Sign</text>
    <text x="87" y="42" class="sm" text-anchor="middle">Alpha · RS-232 / USB</text>
    <text x="87" y="58" class="xs" text-anchor="middle">Alert text display</text>
  </g>
  <path d="M 337,740 V 684" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-ext)"/>
  <text x="345" y="716" class="label" style="fill:#fbbf24">RS-232</text>

  <!-- Operator Web Browser -->
  <g transform="translate(450,740)">
    <rect width="195" height="80" rx="8" fill="url(#ext)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="97" y="24" class="panel-title" text-anchor="middle">Operator Web Browser</text>
    <text x="97" y="42" class="sm" text-anchor="middle">https://eas-station/</text>
    <text x="97" y="58" class="xs" text-anchor="middle">nginx HTTPS · Port 443 → 5000</text>
  </g>
  <path d="M 547,740 V 684" stroke="#93c5fd" stroke-width="1.5" marker-end="url(#arrow-net)"/>
  <text x="555" y="716" class="label" style="fill:#93c5fd">HTTPS</text>

  <!-- Icecast Stream -->
  <g transform="translate(670,740)">
    <rect width="175" height="80" rx="8" fill="url(#ext)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="87" y="24" class="panel-title" text-anchor="middle">Icecast Stream</text>
    <text x="87" y="42" class="sm" text-anchor="middle">Audio streaming server</text>
    <text x="87" y="58" class="xs" text-anchor="middle">FM + EAS monitor streams</text>
  </g>
  <path d="M 757,740 V 684" stroke="#5eead4" stroke-width="1.5" marker-end="url(#arrow-audio)"/>
  <text x="765" y="716" class="label" style="fill:#5eead4">Audio</text>

  <!-- Internet / CAP Feeds -->
  <g transform="translate(870,740)">
    <rect width="195" height="80" rx="8" fill="url(#net)" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="97" y="24" class="panel-title" text-anchor="middle">Internet / CAP Feeds</text>
    <text x="97" y="42" class="sm" text-anchor="middle">api.weather.gov · IPAWS</text>
    <text x="97" y="58" class="xs" text-anchor="middle">NOAA + FEMA alert polling</text>
  </g>
  <path d="M 967,740 V 684" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-net)"/>
  <text x="975" y="716" class="label" style="fill:#93c5fd">WAN</text>

  <!-- Footer -->
  <text x="600" y="886" class="xs" text-anchor="middle" style="fill:#64748b">Reference deployment · Raspberry Pi 5 (8 GB) + NVMe SSD + RTL-SDR + USB Audio DAC + GPIO Relay HAT · See README.md for full bill of materials</text>

</svg>
