<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1100" height="750" viewBox="0 0 1100 750" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="audio-title">
  <title id="audio-title">Audio Source Routing Architecture</title>
  <desc>Block diagram showing how audio sources are routed through adapters, controllers, and monitoring systems in the separated service architecture</desc>

  <defs>
    <linearGradient id="aud-grad-source" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aud-grad-adapter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aud-grad-controller" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aud-grad-monitor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aud-grad-redis" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aud-grad-storage" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="aud-shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="aud-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#334155" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="#f8fafc"/>

  <!-- Title -->
  <text x="550" y="35" font-family="Arial, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#1e293b">
    Audio Source Routing Architecture
  </text>
  <text x="550" y="58" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#64748b">
    Separated architecture: sdr-service container processes audio, publishes metrics to Redis
  </text>

  <!-- sdr-service Container Box -->
  <rect x="20" y="75" width="680" height="420" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="360" y="95" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#166534">
    sdr-service container (USB access, audio processing)
  </text>

  <!-- Audio Sources Column -->
  <rect x="30" y="110" width="170" height="370" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="115" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e40af">
    Audio Sources
  </text>

  <!-- SDR Source -->
  <rect x="45" y="145" width="140" height="75" rx="6" fill="url(#aud-grad-source)" filter="url(#aud-shadow)"/>
  <text x="115" y="165" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">SDR Receiver</text>
  <text x="115" y="182" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#dbeafe">RTL-SDR/Airspy</text>
  <text x="115" y="197" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#bfdbfe">Priority: 1 (highest)</text>
  <text x="115" y="212" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#93c5fd">SoapySDR drivers</text>

  <!-- ALSA Source -->
  <rect x="45" y="230" width="140" height="75" rx="6" fill="url(#aud-grad-source)" filter="url(#aud-shadow)"/>
  <text x="115" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">ALSA Device</text>
  <text x="115" y="267" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#dbeafe">USB Sound Card</text>
  <text x="115" y="282" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#bfdbfe">Priority: 2</text>
  <text x="115" y="297" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#93c5fd">pyalsaaudio</text>

  <!-- HTTP Stream Source -->
  <rect x="45" y="315" width="140" height="75" rx="6" fill="url(#aud-grad-source)" filter="url(#aud-shadow)"/>
  <text x="115" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">HTTP Stream</text>
  <text x="115" y="352" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#dbeafe">Icecast/Shoutcast</text>
  <text x="115" y="367" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#bfdbfe">Priority: 3</text>
  <text x="115" y="382" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#93c5fd">requests/ffmpeg</text>

  <!-- File Source -->
  <rect x="45" y="400" width="140" height="70" rx="6" fill="url(#aud-grad-source)" filter="url(#aud-shadow)"/>
  <text x="115" y="420" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Audio File</text>
  <text x="115" y="437" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#dbeafe">WAV/MP3 Testing</text>
  <text x="115" y="452" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#bfdbfe">Priority: 4</text>
  <text x="115" y="465" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#93c5fd">soundfile/scipy</text>

  <!-- Audio Controller -->
  <rect x="230" y="110" width="180" height="370" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="320" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#065f46">
    Audio Controller
  </text>

  <!-- Audio Ingest Controller -->
  <rect x="245" y="150" width="150" height="80" rx="6" fill="url(#aud-grad-controller)" filter="url(#aud-shadow)"/>
  <text x="320" y="172" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">AudioIngestController</text>
  <text x="320" y="190" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#d1fae5">Priority selection</text>
  <text x="320" y="205" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#d1fae5">Source management</text>
  <text x="320" y="220" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#a7f3d0">app_core/audio/ingest.py</text>

  <path d="M 185,182 L 245,182" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>
  <path d="M 185,267 L 230,210" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>
  <path d="M 185,352 L 230,210" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>
  <path d="M 185,435 L 230,210" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>

  <!-- Broadcast Queue -->
  <rect x="245" y="250" width="150" height="70" rx="6" fill="url(#aud-grad-controller)" filter="url(#aud-shadow)"/>
  <text x="320" y="272" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">BroadcastQueue</text>
  <text x="320" y="290" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#d1fae5">Non-destructive reads</text>
  <text x="320" y="305" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#d1fae5">Multiple subscribers</text>

  <path d="M 320,230 L 320,250" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>

  <!-- EAS Monitor -->
  <rect x="245" y="340" width="150" height="65" rx="6" fill="url(#aud-grad-controller)" filter="url(#aud-shadow)"/>
  <text x="320" y="362" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">EAS Monitor</text>
  <text x="320" y="380" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#d1fae5">SAME decoding</text>
  <text x="320" y="395" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#d1fae5">Alert detection</text>

  <path d="M 320,320 L 320,340" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>

  <!-- Icecast Streamer -->
  <rect x="245" y="420" width="150" height="55" rx="6" fill="url(#aud-grad-controller)" filter="url(#aud-shadow)"/>
  <text x="320" y="442" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Icecast Streamer</text>
  <text x="320" y="460" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#d1fae5">MP3/OGG streams</text>

  <path d="M 320,405 L 320,420" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>

  <!-- Monitoring Column -->
  <rect x="440" y="110" width="160" height="370" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="520" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#92400e">
    Monitoring
  </text>

  <!-- Audio Meter -->
  <rect x="455" y="150" width="130" height="65" rx="6" fill="url(#aud-grad-monitor)" filter="url(#aud-shadow)"/>
  <text x="520" y="172" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">AudioMeter</text>
  <text x="520" y="190" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fef9c3">Peak/RMS levels</text>
  <text x="520" y="205" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#fef9c3">metering.py</text>

  <path d="M 395,190 L 455,180" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>

  <!-- Silence Detector -->
  <rect x="455" y="230" width="130" height="65" rx="6" fill="url(#aud-grad-monitor)" filter="url(#aud-shadow)"/>
  <text x="520" y="252" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">SilenceDetector</text>
  <text x="520" y="270" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fef9c3">Threshold detection</text>
  <text x="520" y="285" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#fef9c3">Alert on silence</text>

  <path d="M 395,190 L 455,260" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>

  <!-- Health Monitor -->
  <rect x="455" y="310" width="130" height="65" rx="6" fill="url(#aud-grad-monitor)" filter="url(#aud-shadow)"/>
  <text x="520" y="332" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">HealthMonitor</text>
  <text x="520" y="350" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fef9c3">Health score 0-100</text>
  <text x="520" y="365" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#fef9c3">Status tracking</text>

  <path d="M 395,190 L 455,340" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>

  <!-- Metrics Publisher -->
  <rect x="455" y="390" width="130" height="85" rx="6" fill="url(#aud-grad-monitor)" filter="url(#aud-shadow)"/>
  <text x="520" y="412" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Metrics Publisher</text>
  <text x="520" y="430" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fef9c3">Collects all metrics</text>
  <text x="520" y="445" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fef9c3">Publishes to Redis</text>
  <text x="520" y="460" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#fef9c3">worker_coordinator_redis.py</text>

  <path d="M 520,215 L 520,230" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>
  <path d="M 520,295 L 520,310" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>
  <path d="M 520,375 L 520,390" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>

  <!-- Redis IPC -->
  <rect x="720" y="130" width="160" height="200" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="800" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#991b1b">
    Redis
  </text>
  <text x="800" y="172" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#b91c1c">
    Inter-Service Cache
  </text>

  <!-- Redis Keys -->
  <rect x="735" y="185" width="130" height="130" rx="6" fill="url(#aud-grad-redis)" filter="url(#aud-shadow)"/>
  <text x="800" y="207" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Metrics Keys</text>
  <text x="800" y="225" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#fecaca">eas:audio:metrics</text>
  <text x="800" y="240" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#fecaca">eas:audio:controller</text>
  <text x="800" y="255" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#fecaca">eas:waveform:*</text>
  <text x="800" y="270" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#fecaca">eas:spectrogram:*</text>
  <text x="800" y="290" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fee2e2">Real-time updates</text>
  <text x="800" y="305" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fee2e2">5s TTL</text>

  <path d="M 585,432 L 700,250" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#aud-arrow)"/>

  <!-- App Container Box -->
  <rect x="720" y="360" width="360" height="290" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="900" y="380" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#3730a3">
    app container (Web UI, API, no hardware access)
  </text>

  <!-- Web UI -->
  <rect x="735" y="400" width="160" height="110" rx="6" fill="#3b82f6" filter="url(#aud-shadow)"/>
  <text x="815" y="422" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Flask Web App</text>
  <text x="815" y="442" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#dbeafe">/audio/sources</text>
  <text x="815" y="460" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#bfdbfe">Real-time VU meters</text>
  <text x="815" y="478" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#bfdbfe">Health dashboards</text>
  <text x="815" y="496" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#93c5fd">Reads metrics from Redis</text>

  <!-- REST API -->
  <rect x="910" y="400" width="155" height="110" rx="6" fill="#3b82f6" filter="url(#aud-shadow)"/>
  <text x="988" y="422" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">REST API</text>
  <text x="988" y="442" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#dbeafe">/api/audio/*</text>
  <text x="988" y="460" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#bfdbfe">GET /api/audio/metrics</text>
  <text x="988" y="478" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#bfdbfe">GET /api/audio/health</text>
  <text x="988" y="496" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#93c5fd">POST /api/audio/sources/*/start</text>

  <path d="M 800,315 L 815,400" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>
  <path d="M 800,315 L 988,400" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>

  <!-- PostgreSQL (Optional Storage) -->
  <rect x="735" y="530" width="330" height="100" rx="6" fill="url(#aud-grad-storage)" filter="url(#aud-shadow)"/>
  <text x="900" y="552" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">PostgreSQL (Configuration Storage)</text>
  <text x="900" y="572" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e0e7ff">AudioSourceConfigDB - Persistent source configurations</text>
  <text x="900" y="590" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e0e7ff">AudioAlert - Silence/error alerts (when triggered)</text>
  <text x="900" y="608" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#c7d2fe">Note: Real-time metrics stored in Redis, not PostgreSQL</text>
  <text x="900" y="622" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#a5b4fc">AudioSourceMetrics/AudioHealthStatus tables available for future aggregation</text>

  <path d="M 815,510 L 815,530" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>
  <path d="M 988,510 L 988,530" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#aud-arrow)"/>

  <!-- Legend -->
  <rect x="30" y="510" width="180" height="140" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="120" y="530" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#334155">Legend</text>

  <rect x="45" y="545" width="20" height="15" rx="3" fill="#3b82f6"/>
  <text x="75" y="557" font-family="Arial, sans-serif" font-size="10" fill="#475569">Audio Source</text>

  <rect x="45" y="565" width="20" height="15" rx="3" fill="#10b981"/>
  <text x="75" y="577" font-family="Arial, sans-serif" font-size="10" fill="#475569">Processing</text>

  <rect x="45" y="585" width="20" height="15" rx="3" fill="#f59e0b"/>
  <text x="75" y="597" font-family="Arial, sans-serif" font-size="10" fill="#475569">Monitoring</text>

  <rect x="45" y="605" width="20" height="15" rx="3" fill="#dc2626"/>
  <text x="75" y="617" font-family="Arial, sans-serif" font-size="10" fill="#475569">Redis IPC</text>

  <rect x="45" y="625" width="20" height="15" rx="3" fill="#6366f1"/>
  <text x="75" y="637" font-family="Arial, sans-serif" font-size="10" fill="#475569">Database</text>

  <!-- Data Flow Note -->
  <rect x="220" y="510" width="380" height="130" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="410" y="530" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#166534">Data Flow Summary</text>
  <text x="230" y="550" font-family="Arial, sans-serif" font-size="10" fill="#166534">1. sdr-service captures audio from SDR/ALSA/HTTP sources</text>
  <text x="230" y="567" font-family="Arial, sans-serif" font-size="10" fill="#166534">2. Audio processed: metering, silence detection, EAS decode</text>
  <text x="230" y="584" font-family="Arial, sans-serif" font-size="10" fill="#166534">3. Metrics published to Redis every 1-5 seconds</text>
  <text x="230" y="601" font-family="Arial, sans-serif" font-size="10" fill="#166534">4. App container reads metrics from Redis for UI/API</text>
  <text x="230" y="618" font-family="Arial, sans-serif" font-size="10" fill="#166534">5. PostgreSQL stores configs and persistent alerts only</text>

  <!-- Footer -->
  <text x="550" y="720" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#64748b">
    Separated architecture: app_core/audio/ (sdr-service) | webapp/admin/audio_ingest.py (app) | Redis for real-time IPC
  </text>
</svg>