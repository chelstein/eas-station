<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">EAS Station Platform Architecture</title>
  <desc id="desc">High-level architecture diagram showing the separated service design with sdr-service, hardware-service, app container, Redis IPC, and PostgreSQL database.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="feedGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#cfe2ff"/>
      <stop offset="100%" stop-color="#7fb3ff"/>
    </linearGradient>
    <linearGradient id="serviceGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4a73c9"/>
      <stop offset="100%" stop-color="#2f5aa8"/>
    </linearGradient>
    <linearGradient id="dbGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2f9074"/>
      <stop offset="100%" stop-color="#46c19b"/>
    </linearGradient>
    <linearGradient id="redisGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="hwGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="outputGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7b5fe0"/>
      <stop offset="100%" stop-color="#a08cf1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#102242" flood-opacity="0.18"/>
    </filter>
    <style>
      text { font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif; fill: #0f1c33; }
      .heading { font-size: 36px; font-weight: 700; letter-spacing: 0.4px; }
      .subtitle { font-size: 18px; fill: #284d7c; }
      .group-label { font-size: 16px; font-weight: 600; fill: #3a5685; }
      .card-title { font-size: 20px; font-weight: 600; fill: #ffffff; }
      .card-body { font-size: 16px; fill: #edf2ff; }
      .card-body.dark { fill: #e5fff4; }
      .card-outline { fill: url(#serviceGradient); rx: 18; filter: url(#shadow); }
      .feed-card { fill: url(#feedGradient); rx: 18; filter: url(#shadow); }
      .db-card { fill: url(#dbGradient); rx: 24; filter: url(#shadow); }
      .redis-card { fill: url(#redisGradient); rx: 18; filter: url(#shadow); }
      .hw-card { fill: url(#hwGradient); rx: 18; filter: url(#shadow); }
      .output-card { fill: url(#outputGradient); rx: 18; filter: url(#shadow); }
      .output-title { font-size: 18px; font-weight: 600; fill: #f8f6ff; }
      .output-body { font-size: 15px; fill: #f5f1ff; }
      .arrow { fill: none; stroke: #325a9a; stroke-width: 5; marker-end: url(#arrowhead); }
      .arrow-redis { fill: none; stroke: #dc2626; stroke-width: 5; marker-end: url(#arrowhead); }
      .arrow-secondary { fill: none; stroke: #2f9074; stroke-width: 5; marker-end: url(#arrowhead); }
      .arrow-output { fill: none; stroke: #7b5fe0; stroke-width: 5; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 14 10; }
    </style>
    <marker id="arrowhead" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="currentColor"/>
    </marker>
  </defs>
  <rect width="1200" height="780" fill="url(#bg)" rx="30"/>
  <text class="heading" x="600" y="50" text-anchor="middle">EAS Station Platform</text>
  <text class="subtitle" x="600" y="80" text-anchor="middle">Separated service architecture with Redis IPC for real-time metrics</text>

  <!-- External Sources -->
  <text class="group-label" x="130" y="110" text-anchor="middle">Alert Sources</text>
  <g transform="translate(40,120)">
    <rect class="feed-card" width="180" height="100"/>
    <text class="card-title" x="90" y="35" text-anchor="middle">NOAA CAP</text>
    <text class="card-body" x="90" y="60" text-anchor="middle">Weather alerts</text>
    <text class="card-body" x="90" y="82" text-anchor="middle">XML polygons</text>
  </g>
  <g transform="translate(40,235)">
    <rect class="feed-card" width="180" height="100"/>
    <text class="card-title" x="90" y="35" text-anchor="middle">IPAWS CAP</text>
    <text class="card-body" x="90" y="60" text-anchor="middle">FEMA alerts</text>
    <text class="card-body" x="90" y="82" text-anchor="middle">120s refresh</text>
  </g>

  <!-- Pollers -->
  <text class="group-label" x="350" y="110" text-anchor="middle">Pollers</text>
  <g transform="translate(260,120)">
    <rect class="card-outline" width="180" height="95"/>
    <text class="card-title" x="90" y="35" text-anchor="middle">noaa-poller</text>
    <text class="card-body" x="90" y="58" text-anchor="middle">CAP ingestion</text>
    <text class="card-body" x="90" y="78" text-anchor="middle">Deduplication</text>
  </g>
  <g transform="translate(260,235)">
    <rect class="card-outline" width="180" height="95"/>
    <text class="card-title" x="90" y="35" text-anchor="middle">ipaws-poller</text>
    <text class="card-body" x="90" y="58" text-anchor="middle">FEMA sync</text>
    <text class="card-body" x="90" y="78" text-anchor="middle">GeoJSON</text>
  </g>

  <!-- Arrows: Sources to Pollers -->
  <path class="arrow" d="M 220 170 H 260"/>
  <path class="arrow" d="M 220 285 H 260"/>

  <!-- Database -->
  <g transform="translate(480,120)">
    <rect class="db-card" width="220" height="210"/>
    <text class="card-title" x="110" y="35" text-anchor="middle">PostgreSQL</text>
    <text class="card-title" x="110" y="58" text-anchor="middle">+ PostGIS</text>
    <text class="card-body dark" x="110" y="90" text-anchor="middle">Alerts storage</text>
    <text class="card-body dark" x="110" y="112" text-anchor="middle">Boundary data</text>
    <text class="card-body dark" x="110" y="134" text-anchor="middle">Audio configs</text>
    <text class="card-body dark" x="110" y="156" text-anchor="middle">Receiver settings</text>
    <text class="card-body dark" x="110" y="178" text-anchor="middle">Compliance logs</text>
    <text class="card-body dark" x="110" y="198" text-anchor="middle" style="font-size:12px;fill:#a7f3d0">Port 5432</text>
  </g>

  <!-- Arrows: Pollers to Database -->
  <path class="arrow-secondary" d="M 440 167 H 480"/>
  <path class="arrow-secondary" d="M 440 282 H 480"/>

  <!-- Redis -->
  <g transform="translate(480,360)">
    <rect class="redis-card" width="220" height="130"/>
    <text class="card-title" x="110" y="30" text-anchor="middle">Redis</text>
    <text class="card-body" x="110" y="55" text-anchor="middle" style="fill:#fecaca">Real-time metrics</text>
    <text class="card-body" x="110" y="75" text-anchor="middle" style="fill:#fecaca">Audio waveforms</text>
    <text class="card-body" x="110" y="95" text-anchor="middle" style="fill:#fecaca">Command pub/sub</text>
    <text class="card-body" x="110" y="115" text-anchor="middle" style="font-size:12px;fill:#fca5a5">5s TTL · Port 6379</text>
  </g>

  <!-- App Container -->
  <text class="group-label" x="870" y="110" text-anchor="middle">app container</text>
  <g transform="translate(740,120)">
    <rect class="card-outline" width="260" height="190"/>
    <text class="card-title" x="130" y="35" text-anchor="middle">Flask Web App</text>
    <text class="card-body" x="130" y="65" text-anchor="middle">Web UI dashboards</text>
    <text class="card-body" x="130" y="88" text-anchor="middle">REST API endpoints</text>
    <text class="card-body" x="130" y="111" text-anchor="middle">Audio metrics (from Redis)</text>
    <text class="card-body" x="130" y="134" text-anchor="middle">EAS workflow controls</text>
    <text class="card-body" x="130" y="157" text-anchor="middle">No hardware access</text>
    <text class="card-body" x="130" y="178" text-anchor="middle" style="font-size:12px;fill:#a5b4fc">Port 5000</text>
  </g>

  <!-- Arrows: Database/Redis to App -->
  <path class="arrow-secondary" d="M 700 225 H 740"/>
  <path class="arrow-redis" d="M 700 425 L 740 280"/>

  <!-- Web Clients -->
  <g transform="translate(1020,150)">
    <rect class="feed-card" width="150" height="130"/>
    <text class="card-title" x="75" y="35" text-anchor="middle">Web Clients</text>
    <text class="card-body" x="75" y="65" text-anchor="middle">Browsers</text>
    <text class="card-body" x="75" y="88" text-anchor="middle">Mobile</text>
    <text class="card-body" x="75" y="111" text-anchor="middle">API clients</text>
  </g>

  <!-- Arrow: App to Web Clients -->
  <path class="arrow" d="M 1000 215 H 1020"/>

  <!-- sdr-service -->
  <text class="group-label" x="180" y="385" text-anchor="middle">sdr-service</text>
  <g transform="translate(40,395)">
    <rect class="card-outline" width="280" height="180"/>
    <text class="card-title" x="140" y="30" text-anchor="middle">Audio Processing</text>
    <text class="card-body" x="140" y="58" text-anchor="middle">SDR capture (RTL-SDR/Airspy)</text>
    <text class="card-body" x="140" y="80" text-anchor="middle">SAME decoding</text>
    <text class="card-body" x="140" y="102" text-anchor="middle">Icecast streaming</text>
    <text class="card-body" x="140" y="124" text-anchor="middle">Audio metering</text>
    <text class="card-body" x="140" y="146" text-anchor="middle">Publishes to Redis</text>
    <text class="card-body" x="140" y="168" text-anchor="middle" style="font-size:12px;fill:#a5b4fc">USB access · Port 5002</text>
  </g>

  <!-- hardware-service -->
  <text class="group-label" x="180" y="600" text-anchor="middle">hardware-service</text>
  <g transform="translate(40,610)">
    <rect class="hw-card" width="280" height="130"/>
    <text class="card-title" x="140" y="30" text-anchor="middle" style="fill:#78350f">Hardware Control</text>
    <text class="card-body" x="140" y="55" text-anchor="middle" style="fill:#fef3c7">GPIO relay control</text>
    <text class="card-body" x="140" y="77" text-anchor="middle" style="fill:#fef3c7">OLED/VFD displays</text>
    <text class="card-body" x="140" y="99" text-anchor="middle" style="fill:#fef3c7">LED sign protocols</text>
    <text class="card-body" x="140" y="118" text-anchor="middle" style="font-size:12px;fill:#92400e">I2C/GPIO access · Port 5001</text>
  </g>

  <!-- Arrows: sdr-service to Redis -->
  <path class="arrow-redis" d="M 320 485 H 480"/>

  <!-- Arrows: hardware-service to Redis -->
  <path class="arrow-redis" d="M 320 675 L 480 475"/>

  <!-- Physical Hardware -->
  <text class="group-label" x="890" y="385" text-anchor="middle">Physical Hardware</text>
  <g transform="translate(740,395)">
    <rect class="output-card" width="260" height="180"/>
    <text class="output-title" x="130" y="30" text-anchor="middle">Outputs</text>
    <text class="output-body" x="130" y="58" text-anchor="middle">SDR Receivers (USB)</text>
    <text class="output-body" x="130" y="80" text-anchor="middle">FM Transmitter (GPIO)</text>
    <text class="output-body" x="130" y="102" text-anchor="middle">Audio DAC (I2S/USB)</text>
    <text class="output-body" x="130" y="124" text-anchor="middle">LED Signs (RS-232)</text>
    <text class="output-body" x="130" y="146" text-anchor="middle">OLED/VFD Displays (I2C)</text>
    <text class="output-body" x="130" y="168" text-anchor="middle" style="font-size:12px">Icecast streams (network)</text>
  </g>

  <!-- Arrows: Services to Hardware -->
  <path class="arrow-output" d="M 320 485 L 740 485"/>
  <path class="arrow-output" d="M 320 675 L 740 555"/>

  <!-- nginx -->
  <g transform="translate(1020,320)">
    <rect class="feed-card" width="150" height="100"/>
    <text class="card-title" x="75" y="35" text-anchor="middle">nginx</text>
    <text class="card-body" x="75" y="60" text-anchor="middle">HTTPS proxy</text>
    <text class="card-body" x="75" y="82" text-anchor="middle">Let's Encrypt</text>
  </g>

  <!-- Icecast -->
  <g transform="translate(1020,445)">
    <rect class="feed-card" width="150" height="100"/>
    <text class="card-title" x="75" y="35" text-anchor="middle">Icecast</text>
    <text class="card-body" x="75" y="60" text-anchor="middle">Audio streams</text>
    <text class="card-body" x="75" y="82" text-anchor="middle">MP3/OGG</text>
  </g>

  <!-- Data flow note -->
  <g transform="translate(740,610)">
    <rect width="430" height="130" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="215" y="25" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#166534">Key Architecture Points</text>
    <text x="20" y="48" font-family="Arial" font-size="12" fill="#166534">• App container has NO hardware access (reads metrics from Redis)</text>
    <text x="20" y="68" font-family="Arial" font-size="12" fill="#166534">• sdr-service handles all audio capture and SAME decoding</text>
    <text x="20" y="88" font-family="Arial" font-size="12" fill="#166534">• hardware-service controls GPIO, displays, and LED signs</text>
    <text x="20" y="108" font-family="Arial" font-size="12" fill="#166534">• Redis provides real-time IPC (5s TTL for live metrics)</text>
    <text x="20" y="125" font-family="Arial" font-size="12" fill="#166534">• PostgreSQL stores configs and persistent data only</text>
  </g>
</svg>