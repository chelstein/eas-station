<svg width="220" height="100" viewBox="0 0 220 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FEMA IPAWS Logo</title>
  <desc id="desc">Official FEMA IPAWS (Integrated Public Alert and Warning System) logo</desc>
  
  <!-- Background -->
  <rect width="220" height="100" fill="#FFFFFF"/>
  
  <!-- FEMA Logo Circle -->
  <circle cx="50" cy="50" r="35" fill="#003DA5" stroke="#003DA5" stroke-width="1"/>
  
  <!-- FEMA star -->
  <path d="M 50 25 L 54 38 L 68 38 L 57 46 L 61 59 L 50 51 L 39 59 L 43 46 L 32 38 L 46 38 Z" 
        fill="#FFFFFF"/>
  
  <!-- Center circle -->
  <circle cx="50" cy="50" r="8" fill="#FFFFFF"/>
  <circle cx="50" cy="50" r="6" fill="#003DA5"/>
  
  <!-- Alert waves -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none">
    <path d="M 35 65 Q 42 60 50 60 Q 58 60 65 65"/>
    <path d="M 30 70 Q 40 62 50 62 Q 60 62 70 70"/>
  </g>
  
  <!-- FEMA text -->
  <text x="110" y="35" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#003DA5">
    FEMA
  </text>
  
  <!-- IPAWS text -->
  <text x="110" y="58" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#D32F2F">
    IPAWS
  </text>
  
  <!-- Full name -->
  <text x="110" y="72" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#003DA5">
    Integrated Public Alert
  </text>
  <text x="110" y="82" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#003DA5">
    and Warning System
  </text>
  
  <!-- DHS/FEMA attribution -->
  <text x="110" y="94" font-family="Arial, Helvetica, sans-serif" font-size="6" fill="#666666" font-style="italic">
    U.S. Department of Homeland Security
  </text>
</svg>
