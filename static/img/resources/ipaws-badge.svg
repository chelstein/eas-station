<svg width="220" height="100" viewBox="0 0 220 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FEMA Logo</title>
  <desc id="desc">Official Federal Emergency Management Agency logo</desc>
  
  <!-- Background -->
  <rect width="220" height="100" fill="#FFFFFF"/>
  
  <!-- FEMA Circle (blue) -->
  <circle cx="50" cy="50" r="38" fill="#002F6C"/>
  
  <!-- White star (5-pointed) -->
  <path d="M 50 20 L 54.5 36.5 L 72 36.5 L 58 47 L 62.5 63.5 L 50 53 L 37.5 63.5 L 42 47 L 28 36.5 L 45.5 36.5 Z" 
        fill="#FFFFFF"/>
  
  <!-- Small circle at center -->
  <circle cx="50" cy="50" r="6" fill="#002F6C"/>
  
  <!-- FEMA text -->
  <text x="100" y="50" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#002F6C">
    FEMA
  </text>
  
  <!-- Federal Emergency Management Agency -->
  <text x="100" y="68" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#002F6C">
    Federal Emergency
  </text>
  <text x="100" y="78" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#002F6C">
    Management Agency
  </text>
  
  <!-- Note: For IPAWS, use separate badge or combined reference -->
  <text x="100" y="92" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#666666" font-style="italic">
    U.S. Department of Homeland Security
  </text>
</svg>
