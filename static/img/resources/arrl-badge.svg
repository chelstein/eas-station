<svg width="220" height="100" viewBox="0 0 220 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ARRL Logo</title>
  <desc id="desc">Official American Radio Relay League logo with diamond emblem</desc>
  
  <!-- Background -->
  <rect width="220" height="100" fill="#FFFFFF"/>
  
  <!-- ARRL Diamond -->
  <g transform="translate(50, 50)">
    <!-- Outer diamond -->
    <path d="M 0 -35 L 35 0 L 0 35 L -35 0 Z" fill="#DC143C" stroke="#8B0000" stroke-width="2"/>
    
    <!-- Inner diamond (white) -->
    <path d="M 0 -28 L 28 0 L 0 28 L -28 0 Z" fill="#FFFFFF"/>
    
    <!-- Center diamond (red) -->
    <path d="M 0 -20 L 20 0 L 0 20 L -20 0 Z" fill="#DC143C"/>
    
    <!-- Lightning bolt -->
    <path d="M 2 -12 L -3 0 L 2 0 L -3 12 L 8 -2 L 2 -2 Z" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
  </g>
  
  <!-- ARRL text -->
  <text x="110" y="45" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="#DC143C">
    ARRL
  </text>
  
  <!-- Full name -->
  <text x="110" y="62" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">
    American Radio
  </text>
  <text x="110" y="74" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#000000">
    Relay League
  </text>
  
  <!-- Tagline -->
  <text x="110" y="88" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#DC143C" font-weight="600">
    The national association for
  </text>
  <text x="110" y="97" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#DC143C" font-weight="600">
    Amateur Radio®
  </text>
</svg>
