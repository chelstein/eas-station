<svg width="220" height="100" viewBox="0 0 220 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NOAA Logo</title>
  <desc id="desc">Official National Oceanic and Atmospheric Administration logo</desc>
  
  <!-- Background -->
  <rect width="220" height="100" fill="#FFFFFF"/>
  
  <!-- NOAA text - main identifier -->
  <text x="10" y="55" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#0055A4" letter-spacing="-2">
    NOAA
  </text>
  
  <!-- Subtitle text -->
  <text x="10" y="72" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#0055A4">
    National Oceanic and Atmospheric Administration
  </text>
  
  <!-- Department affiliation -->
  <text x="10" y="88" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#666666">
    U.S. Department of Commerce
  </text>
  
  <!-- Decorative wave element (simplified from official logo) -->
  <path d="M 180 40 Q 185 35 190 40 T 200 40" stroke="#0055A4" stroke-width="2" fill="none"/>
  <path d="M 180 50 Q 185 45 190 50 T 200 50" stroke="#0055A4" stroke-width="2" fill="none"/>
  <path d="M 180 60 Q 185 55 190 60 T 200 60" stroke="#0055A4" stroke-width="2" fill="none"/>
</svg>
