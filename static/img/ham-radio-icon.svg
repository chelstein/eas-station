<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Official ARES (Amateur Radio Emergency Service) Logo -->
  <!-- Based on official ARRL ARES design: red/white/blue diamond shield -->
  
  <defs>
    <!-- Red gradient for red sections -->
    <linearGradient id="aresRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E31E24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:1" />
    </linearGradient>
    <!-- Blue gradient for blue sections -->
    <linearGradient id="aresBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main diamond shape (outer) -->
  <path d="M 100 15 L 175 70 L 100 125 L 25 70 Z" 
        fill="#E31E24" stroke="#000000" stroke-width="3"/>
  
  <!-- Top triangle (BLUE) -->
  <path d="M 100 15 L 175 70 L 100 70 Z" 
        fill="url(#aresBlue)"/>
  
  <!-- Bottom triangle (RED) -->
  <path d="M 100 70 L 175 70 L 100 125 L 25 70 Z" 
        fill="url(#aresRed)"/>
  
  <!-- Left triangle (RED) -->
  <path d="M 25 70 L 100 15 L 100 70 Z" 
        fill="url(#aresRed)"/>
  
  <!-- White center diamond -->
  <path d="M 100 45 L 135 70 L 100 95 L 65 70 Z" 
        fill="#FFFFFF"/>
  
  <!-- Lightning bolt in center (yellow/gold) -->
  <path d="M 105 52 L 95 70 L 100 70 L 93 88 L 107 68 L 102 68 Z" 
        fill="#FFD700" stroke="#FFA000" stroke-width="1.5"/>
  
  <!-- ARES text -->
  <text x="100" y="155" 
        font-family="Impact, Arial Black, sans-serif" 
        font-size="42" 
        font-weight="bold" 
        fill="#E31E24" 
        text-anchor="middle"
        letter-spacing="2">ARES</text>
  
  <!-- Amateur Radio Emergency Service -->
  <text x="100" y="178" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="11" 
        font-weight="600" 
        fill="#1565C0" 
        text-anchor="middle">Amateur Radio Emergency Service</text>
  
  <!-- ARRL registered trademark -->
  <text x="100" y="200" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="10" 
        fill="#666666" 
        text-anchor="middle"
        font-style="italic">ARRL®</text>
</svg>
