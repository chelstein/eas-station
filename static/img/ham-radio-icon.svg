<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Official ARES (Amateur Radio Emergency Service) Logo -->
  <!-- Based on the official ARRL ARES design -->
  
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C1E47;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Diamond/Shield outline -->
  <path d="M 100 10 L 180 60 L 100 110 L 20 60 Z" 
        fill="url(#redGrad)" stroke="#FFD700" stroke-width="4"/>
  
  <!-- Upper triangle (blue) -->
  <path d="M 100 10 L 180 60 L 100 60 Z" 
        fill="url(#blueGrad)"/>
  
  <!-- Lower triangle (red) -->
  <path d="M 100 60 L 180 60 L 100 110 Z" 
        fill="url(#redGrad)"/>
  
  <!-- White center stripe -->
  <path d="M 100 35 L 140 60 L 100 85 L 60 60 Z" 
        fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Lightning bolt symbol -->
  <path d="M 105 40 L 95 60 L 102 60 L 95 80 L 110 58 L 102 58 Z" 
        fill="#FFD700" stroke="#8B4513" stroke-width="1"/>
  
  <!-- ARES text -->
  <text x="100" y="145" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="36" 
        font-weight="bold" 
        fill="#DC143C" 
        text-anchor="middle"
        stroke="#8B0000" 
        stroke-width="1">ARES</text>
  
  <!-- Amateur Radio Emergency Service text -->
  <text x="100" y="170" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="12" 
        font-weight="600" 
        fill="#1E3A8A" 
        text-anchor="middle">Amateur Radio</text>
  
  <text x="100" y="186" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="12" 
        font-weight="600" 
        fill="#1E3A8A" 
        text-anchor="middle">Emergency Service</text>
  
  <!-- ARRL attribution -->
  <text x="100" y="210" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="10" 
        fill="#666666" 
        text-anchor="middle"
        font-style="italic">ARRL®</text>
</svg>
